<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>사내 연차 관리 시스템</title>

<!-- Supabase JS Client (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --navy-900: #0f1f3d; --navy-700: #1e3a5f; --navy-500: #345078;
    --green-500: #2f9e6b; --green-600: #237a52;
    --yellow-500: #e4b53a;
    --gray-50:  #f6f7fb; --gray-100: #eceff5; --gray-200: #dfe3eb;
    --gray-400: #9aa3b2; --gray-600: #555f72; --gray-800: #232a36;
    --red-500: #d44a4a;
    --white: #ffffff;
    --shadow-sm: 0 1px 2px rgba(15,31,61,0.06);
    --shadow-md: 0 4px 16px rgba(15,31,61,0.08);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR",
                 "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--gray-50); color: var(--gray-800);
    line-height: 1.5; font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  a { color: inherit; text-decoration: none; }

  .boot-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy-900), var(--navy-500));
    color: white; font-size: 14px;
  }
  .boot-wrap .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy-900), var(--navy-500));
    padding: 24px;
  }
  .login-card {
    width: 100%; max-width: 420px;
    background: var(--white); border-radius: 16px;
    padding: 36px 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .login-card h1 { margin: 0 0 6px; font-size: 22px; color: var(--navy-900); }
  .login-card .sub { margin: 0 0 24px; color: var(--gray-600); font-size: 13px; }
  .login-card label {
    display: block; margin: 12px 0 4px;
    font-size: 12px; color: var(--gray-600); font-weight: 600;
  }
  .login-card input, .login-card select {
    width: 100%; padding: 11px 13px;
    border: 1px solid var(--gray-200); border-radius: 8px;
    outline: none; transition: border-color .15s;
  }
  .login-card input:focus, .login-card select:focus { border-color: var(--navy-500); }
  .login-card .btn-primary {
    width: 100%; margin-top: 18px; padding: 12px;
    background: var(--navy-900); color: var(--white);
    border: none; border-radius: 8px;
    font-weight: 600; font-size: 14px;
  }
  .login-card .btn-primary:hover { background: var(--navy-700); }
  .login-card .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-card .err {
    margin-top: 12px; color: var(--red-500); font-size: 12px; min-height: 16px;
  }
  .login-card .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .app { display: none; min-height: 100vh; }
  .app.active { display: flex; }
  .sidebar {
    width: 220px; background: var(--navy-900); color: var(--white);
    padding: 24px 0; display: flex; flex-direction: column; flex-shrink: 0;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
    align-self: flex-start;
  }
  .sidebar .brand { padding: 0 22px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
  .sidebar .brand h2 { margin: 0; font-size: 16px; font-weight: 700; }
  .sidebar .brand p { margin: 4px 0 0; font-size: 11px; color: rgba(255,255,255,0.55); }
  .sidebar nav { flex: 1; padding: 0 12px; }
  .sidebar nav button {
    display: block; width: 100%; text-align: left;
    background: transparent; color: rgba(255,255,255,0.78);
    border: none; padding: 11px 14px; border-radius: 8px;
    font-size: 13px; margin-bottom: 2px;
    transition: background .15s, color .15s;
  }
  .sidebar nav button:hover { background: rgba(255,255,255,0.06); color: var(--white); }
  .sidebar nav button.active { background: var(--green-500); color: var(--white); font-weight: 600; }
  .sidebar nav .section {
    margin: 14px 14px 6px;
    font-size: 10px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .sidebar .user-box {
    padding: 14px 22px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 12px;
  }
  .sidebar .user-box .name { font-weight: 600; }
  .sidebar .user-box .role { color: rgba(255,255,255,0.55); margin-top: 2px; }
  .sidebar .user-box button {
    margin-top: 8px; width: 100%;
    background: transparent; color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px; border-radius: 6px; font-size: 12px;
  }
  .sidebar .user-box button:hover { background: rgba(255,255,255,0.06); }

  .main { flex: 1; padding: 28px 36px; overflow-x: auto; }
  .page-title { font-size: 22px; font-weight: 700; color: var(--navy-900); margin: 0 0 4px; }
  .page-sub { color: var(--gray-600); font-size: 13px; margin: 0 0 24px; }

  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 22px; margin-bottom: 18px; }
  .card h3 { margin: 0 0 14px; font-size: 15px; color: var(--navy-900); }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-sm); border-left: 4px solid var(--navy-500); }
  .stat-card.green { border-left-color: var(--green-500); }
  .stat-card.yellow { border-left-color: var(--yellow-500); }
  .stat-card .label { color: var(--gray-600); font-size: 12px; margin-bottom: 6px; }
  .stat-card .value { font-size: 26px; font-weight: 700; color: var(--navy-900); }
  .stat-card .unit { font-size: 13px; color: var(--gray-600); font-weight: 500; margin-left: 4px; }

  .btn { background: var(--navy-900); color: var(--white); border: none; padding: 9px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; }
  .btn:hover { background: var(--navy-700); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--navy-700); border: 1px solid var(--gray-200); }
  .btn.ghost:hover { background: var(--gray-50); }
  .btn.green { background: var(--green-500); }
  .btn.green:hover { background: var(--green-600); }
  .btn.danger { background: var(--red-500); }
  .btn.danger:hover { background: #b53b3b; }
  .btn.sm { padding: 7px 13px; font-size: 12.5px; }
  .btn.xs { padding: 6px 10px; font-size: 12px; }

  .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
  .form-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .form-row.cols-1 { grid-template-columns: 1fr; }
  .form-group label { display: block; font-size: 12px; color: var(--gray-600); font-weight: 600; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 11px;
    border: 1px solid var(--gray-200); border-radius: 7px;
    outline: none; background: var(--white);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--navy-500); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group .hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table th, table td { text-align: center; padding: 14px 14px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
  table th { color: var(--gray-600); font-weight: 600; background: var(--gray-50); font-size: 12.5px; letter-spacing: 0.02em; text-align: center !important; }
  table tbody tr:hover { background: var(--gray-50); }
  table tbody tr.req-row { cursor: pointer; }
  table tbody tr.req-row:hover { background: #eef3ff; }
  table td .actions-cell { display: inline-flex; flex-wrap: wrap; gap: 6px; justify-content: center; }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.pending { background: #e9ecf2; color: var(--gray-600); }
  .badge.approved { background: #e3f4ec; color: var(--green-600); }
  .badge.approved-half { background: #fcf3d5; color: #8a6a14; }
  .badge.rejected { background: #fbe4e4; color: #a73838; }
  .badge.role { background: var(--gray-100); color: var(--navy-700); }
  .badge.role.admin { background: #e3edff; color: var(--navy-700); }

  .info-banner { background: #eff5ff; border: 1px solid #d6e4ff; color: var(--navy-700); padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .err-banner { background: #fdebeb; border: 1px solid #f5c6c6; color: #8b2929; padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .ok-banner { background: #e8f5ee; border: 1px solid #c4e6d2; color: #1d6e44; padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .empty { padding: 32px; text-align: center; color: var(--gray-400); font-size: 13px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }

  @media (max-width: 768px) {
    .app.active { flex-direction: column; }
    .sidebar {
      width: 100%; flex-direction: row; align-items: center; padding: 12px 14px;
      overflow-x: auto; overflow-y: visible;
      position: static; height: auto;
    }
    .sidebar .brand { border-bottom: none; padding: 0 12px 0 0; margin-bottom: 0; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.1); margin-right: 8px; }
    .sidebar nav { display: flex; padding: 0; gap: 4px; flex: 1; }
    .sidebar nav .section { display: none; }
    .sidebar nav button { white-space: nowrap; padding: 8px 12px; }
    .sidebar .user-box { border-top: none; padding: 0 8px; flex-shrink: 0; }
    .sidebar .user-box .role { display: none; }
    .sidebar .user-box button { margin-top: 0; padding: 6px 10px; }
    .main { padding: 18px 16px; }
    .grid-3 { grid-template-columns: 1fr; }
    .form-row, .form-row.cols-3 { grid-template-columns: 1fr; }
    table { font-size: 13px; }
    table th, table td { padding: 10px 8px; }
  }

  /* 월간 달력 */
  .cal-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; flex-wrap: wrap; }
  .cal-toolbar .title { font-size: 16px; font-weight: 700; color: var(--navy-900); }
  .cal-toolbar .nav-btns { display: flex; gap: 6px; }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 1px; background: var(--gray-200);
    border: 1px solid var(--gray-200); border-radius: 8px; overflow: hidden;
  }
  .cal-head, .cal-cell { background: white; }
  .cal-head {
    text-align: center; font-size: 13px; font-weight: 700; color: var(--gray-600);
    background: var(--gray-50); padding: 10px 6px;
  }
  .cal-head.sun, .cal-head.sat { color: var(--red-500); }
  .cal-cell { padding: 8px 8px 10px; min-height: 130px; }
  .cal-cell .day { font-size: 13px; color: var(--gray-600); margin-bottom: 6px; }
  .cal-cell.other-month { background: #fafbfd; }
  .cal-cell.other-month .day { color: var(--gray-400); }
  .cal-cell.today .day { color: var(--navy-700); font-weight: 700; }
  .cal-cell.today { background: #f4f8ff; }
  .cal-cell.sun .day, .cal-cell.sat .day { color: var(--red-500); }
  .cal-evt {
    display: block; font-size: 12.5px;
    padding: 3px 7px; border-radius: 3px; margin-bottom: 3px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: white; font-weight: 600;
  }
  .cal-evt.pending { background: transparent; color: var(--gray-800); padding-left: 2px; }
  .cal-evt.pending::before { content: "●"; color: #5b8def; margin-right: 2px; font-size: 12px; }
  .cal-evt.approved { background: var(--green-500); }
  .cal-evt.approved-half { background: var(--yellow-500); color: #5a4710; }
  /* 근태 이벤트 (관리자만 표시) — 연차와 시각적으로 구분되도록 어두운 배색 */
  .cal-evt.att-late   { background: #ef6b6b; color: white; }
  .cal-evt.att-absent { background: var(--red-500); color: white; }
  .cal-evt.att-sick   { background: #b39ddb; color: white; }
  .cal-evt.att-etc    { background: var(--gray-400); color: white; }
  /* 관리자가 셀에 호버하면 클릭 가능한 느낌을 줌 */
  .cal-cell.clickable { cursor: pointer; }
  .cal-cell.clickable:hover { background: #f4f8ff; }
  .cal-cell.clickable.other-month:hover { background: #f0f4fb; }
  .cal-legend { display: flex; gap: 14px; font-size: 11px; color: var(--gray-600); margin-top: 10px; flex-wrap: wrap; }
  .cal-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .cal-legend i { display: inline-block; width: 10px; height: 10px; border-radius: 2px; }
  @media (max-width: 768px) {
    .cal-cell { min-height: 85px; padding: 5px; }
    .cal-evt { font-size: 11px; padding: 2px 5px; }
    .cal-cell .day { font-size: 12px; }
    .cal-head { font-size: 12px; padding: 8px 4px; }
  }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,31,61,0.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 18px; }
  .modal-backdrop.active { display: flex; }
  .modal { position: relative; background: var(--white); border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; box-shadow: var(--shadow-md); max-height: 90vh; overflow-y: auto; }
  .modal.wide { max-width: 720px; }
  .modal h3 { margin: 0 0 14px; color: var(--navy-900); padding-right: 32px; }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; padding: 0;
    background: transparent; border: none;
    font-size: 22px; line-height: 1; font-weight: 400;
    color: var(--gray-400); border-radius: 6px;
    cursor: pointer; z-index: 2;
    transition: background .15s, color .15s;
  }
  .modal-close:hover { background: var(--gray-100); color: var(--gray-800); }

  /* 직원 상세 모달용 탭 */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--gray-200); margin: 0 0 18px; }
  .tabs button {
    background: transparent; border: none; padding: 10px 16px;
    font-size: 13px; font-weight: 600; color: var(--gray-600);
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .15s, border-color .15s;
  }
  .tabs button:hover { color: var(--navy-700); }
  .tabs button.active { color: var(--navy-900); border-bottom-color: var(--green-500); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 직원 관리 표 — 행 클릭 가능 + 살짝 큰 폰트 */
  table tbody tr.emp-row { cursor: pointer; }
  table tbody tr.emp-row:hover { background: #eef3ff; }
  table.emp-table { font-size: 15.5px; }
  table.emp-table th { font-size: 13.5px; }
  table.emp-table th, table.emp-table td { padding: 17px 14px; }

  /* 정보 박스 (상세 모달 내 정보 행) */
  .info-row { display: flex; padding: 8px 0; border-bottom: 1px solid var(--gray-100); font-size: 13.5px; }
  .info-row .lbl { width: 100px; color: var(--gray-600); font-weight: 600; flex-shrink: 0; }
  .info-row .val { flex: 1; word-break: break-word; }

  /* 근태 배지 */
  .badge.att-late   { background: #fcf3d5; color: #8a6a14; }
  .badge.att-absent { background: #fbe4e4; color: #a73838; }
  .badge.att-sick   { background: #e3edff; color: var(--navy-700); }
  .badge.att-etc    { background: var(--gray-100); color: var(--gray-600); }
</style>
</head>
<body>

<div id="bootScreen" class="boot-wrap">
  <div class="spinner"></div>
  <div>시스템을 불러오는 중입니다...</div>
</div>

<!-- 초기 관리자 설정 -->
<div id="setupScreen" class="login-wrap" style="display:none;">
  <div class="login-card">
    <h1>최초 관리자 등록</h1>
    <p class="sub">이 시스템을 처음 사용합니다. 첫 관리자 계정을 만들어 주세요.</p>
    <form id="setupForm">
      <div class="row-2">
        <div>
          <label>아이디 *</label>
          <input id="setupUsername" required placeholder="예: admin" autocomplete="off" />
        </div>
        <div>
          <label>이름 *</label>
          <input id="setupName" required placeholder="예: 홍길동" />
        </div>
      </div>
      <label>이메일</label>
      <input id="setupEmail" type="email" placeholder="예: admin@whrcompany.com" />
      <div class="row-2">
        <div>
          <label>입사일 *</label>
          <input id="setupHire" type="date" required />
        </div>
        <div>
          <label>비밀번호 *</label>
          <input id="setupPw" type="password" required placeholder="최소 4자" />
        </div>
      </div>
      <button type="submit" class="btn-primary">관리자 계정 만들기</button>
      <div class="err" id="setupErr"></div>
    </form>
  </div>
</div>

<!-- 로그인 -->
<div id="loginScreen" class="login-wrap" style="display:none;">
  <div class="login-card">
    <h1>사내 연차 관리 시스템</h1>
    <p class="sub">아이디와 비밀번호로 로그인해 주세요.</p>
    <form id="loginForm">
      <label for="loginUsername">아이디</label>
      <input id="loginUsername" type="text" autocomplete="username" required />
      <label for="loginPw">비밀번호</label>
      <input id="loginPw" type="password" autocomplete="current-password" required />
      <button type="submit" class="btn-primary" id="loginBtn">로그인</button>
      <div class="err" id="loginErr"></div>
    </form>
    <div style="margin-top:16px; text-align:center; font-size:12px; color:var(--gray-600);">
      처음 가입하시나요?
      <a href="#" id="goSignup" style="color:var(--green-600); font-weight:600;">회원가입</a>
    </div>
  </div>
</div>

<!-- 회원가입 -->
<div id="signupScreen" class="login-wrap" style="display:none;">
  <div class="login-card">
    <h1>회원가입</h1>
    <p class="sub" id="signupSub">본인 이름과 입사일을 입력해 주세요. 관리자가 미리 등록한 직원 목록에서 찾습니다.</p>

    <!-- 1단계: 매칭 -->
    <form id="signupMatchForm">
      <label>이름 *</label>
      <input id="suName" required placeholder="예: 홍길동" />
      <label>입사일 *</label>
      <input id="suHire" type="date" required />
      <button type="submit" class="btn-primary" id="suMatchBtn">다음</button>
      <div class="err" id="suMatchErr"></div>
      <div style="margin-top:14px; text-align:center; font-size:12px; color:var(--gray-600);">
        <a href="#" id="backToLogin" style="color:var(--navy-700);">← 로그인으로 돌아가기</a>
      </div>
    </form>

    <!-- 2단계: 정보 입력 -->
    <form id="signupInfoForm" style="display:none;">
      <div class="ok-banner" style="margin-bottom: 14px;">
        <strong id="suMatched"></strong>님 맞으시죠? 사용할 아이디와 비밀번호를 정하고 추가 정보를 입력해 주세요.
      </div>
      <div class="row-2">
        <div>
          <label>아이디 *</label>
          <input id="suUsername" required autocomplete="off" placeholder="영문/숫자 권장" />
        </div>
        <div>
          <label>이메일 *</label>
          <input id="suEmail" type="email" required placeholder="예: name@whrcompany.com" />
        </div>
      </div>
      <label>휴대전화 *</label>
      <input id="suPhone" type="tel" inputmode="numeric" required maxlength="13" placeholder="010-0000-0000" autocomplete="tel" />
      <div class="row-2">
        <div>
          <label>비밀번호 *</label>
          <input id="suPw" type="password" required placeholder="최소 4자" />
        </div>
        <div>

// DB의 date 컬럼은 "2026-05-04" 형식. new Date()로 파싱하면 UTC 자정으로 해석되어
// 음수 시간대에서 하루 밀리는 문제 발생. 항상 parseLocalDate 를 통해 로컬 자정으로 만든다.
function parseLocalDate(s) {
  if (!s) return null;
  if (s instanceof Date) return s;
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (m) return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  return new Date(s);
}
const fmtDate = (d) => {
  if (!d) return "-";
  // ISO 날짜 문자열(시간 없는 형태)이면 그대로 반환 — 시간대 변환 회피
  if (typeof d === "string" && /^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  if (!(d instanceof Date)) d = new Date(d);
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
};
const today = () => new Date();

async function hashPassword(pw) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest("SHA-256", enc.encode(pw));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function formatPhoneNumber(value) {
  const digits = String(value || "").replace(/\D/g, "").slice(0, 11);
  if (digits.length <= 3) return digits;
  if (digits.length <= 7) return digits.slice(0, 3) + "-" + digits.slice(3);
  return digits.slice(0, 3) + "-" + digits.slice(3, 7) + "-" + digits.slice(7);
}
const PHONE_RE = /^\d{3}-\d{4}-\d{4}$/;
function isValidPhone(value) {
  return PHONE_RE.test(String(value || ""));
}
// 입력 필드에 자동 포맷팅 리스너 부착
function attachPhoneAutoFormat(input) {
  if (!input) return;
  input.addEventListener("input", () => {
    const before = input.value;
    const after = formatPhoneNumber(before);
    if (before !== after) input.value = after;
  });
}

/* ------------------ 4. 연차 계산 ------------------ */
function calcGrantedForYear(emp, year, asOf = today()) {
  const policy = Store.getPolicy();
  const hireDate = parseLocalDate(emp.hireDate);
  const yearEnd = new Date(year, 11, 31, 23, 59, 59);
  const ref = asOf < yearEnd ? asOf : yearEnd;
  if (hireDate > new Date(year, 11, 31)) return 0;

  let granted = 0;
  for (let m = 0; m < 12; m++) {
    const eventDate = new Date(year, m, 1);
    if (eventDate > ref) break;
    const prevMonthStart = new Date(year, m - 1, 1);
    if (hireDate <= prevMonthStart) granted += policy.monthlyAccrual;
  }
  const oneYearAnniv = new Date(hireDate);
  oneYearAnniv.setFullYear(oneYearAnniv.getFullYear() + 1);
  if (oneYearAnniv.getFullYear() === year && oneYearAnniv <= ref) {
    granted += policy.yearOneBulk;
  }
  return granted;
}
function calcUsedForYear(empNo, year) {
  return Store.getRequests()
    .filter((r) => r.empNo === empNo && r.status === "approved")
    .filter((r) => parseLocalDate(r.startDate).getFullYear() === year)
    .reduce((sum, r) => sum + Number(r.days || 0), 0);
}
function calcBalance(emp, year = today().getFullYear()) {
  const granted = calcGrantedForYear(emp, year);
  const used = calcUsedForYear(emp.empNo, year);
  const adj = Number(emp.leaveAdjustment || 0);
  return { granted, used, adjustment: adj, remaining: Math.max(0, granted + adj - used) };
}

function renderMonthCalendar() {
  const year = _calMonth.getFullYear();
  const month = _calMonth.getMonth(); // 0~11
  const firstDay = new Date(year, month, 1);
  const firstWeekday = firstDay.getDay(); // 0=일
  const startDate = new Date(year, month, 1 - firstWeekday);
  const todayStr = fmtDate(today());
  const cu = currentUser();
  const isAdmin = cu && cu.role === "admin";

  // 날짜별 이벤트 매핑
  // - 연차/반차/대기는 전 직원에게 표시 (모든 사용자가 봄)
  // - 근태기록(지각/결근/병가/기타)은 관리자에게만 표시 (개인정보)
  const eventsByDate = {};

  // 연차 신청 — 승인 + 대기 (반려는 제외)
  Store.getRequests()
    .filter(r => r.status === "approved" || r.status === "pending")
    .forEach(r => {
      const s = parseLocalDate(r.startDate);
      const e = parseLocalDate(r.endDate);
      const d = new Date(s);
      while (d <= e) {
        const k = fmtDate(d);
        if (!eventsByDate[k]) eventsByDate[k] = [];
        eventsByDate[k].push({ kind: "leave", data: r });
        d.setDate(d.getDate() + 1);
      }
    });

  // 근태 기록 (관리자에게만 공개)
  if (isAdmin) {
    Store._cache.attendance.forEach(a => {
      const k = a.recordDate;
      if (!eventsByDate[k]) eventsByDate[k] = [];
      eventsByDate[k].push({ kind: "attendance", data: a });
    });
  }

  $("#calTitle").textContent = `${year}년 ${month + 1}월`;

  // 그 달이 차지하는 주 수 계산 (4·5·6주)
  const lastDayNum = new Date(year, month + 1, 0).getDate();
  const totalSlots = firstWeekday + lastDayNum;
  const numWeeks = Math.ceil(totalSlots / 7);
  const totalCells = numWeeks * 7;

  const dayHeads = ["일","월","화","수","목","금","토"];
  let html = `<div class="cal-grid">`;
  dayHeads.forEach((h, i) => {
    const cls = i === 0 ? "sun" : (i === 6 ? "sat" : "");
    html += `<div class="cal-head ${cls}">${h}</div>`;
  });

  for (let i = 0; i < totalCells; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    const isOther = d.getMonth() !== month;
    const isToday = fmtDate(d) === todayStr;
    const wd = d.getDay();
    const classes = ["cal-cell"];
    if (isOther) classes.push("other-month");
    if (isToday) classes.push("today");
    if (wd === 0) classes.push("sun");
    if (wd === 6) classes.push("sat");
    if (isAdmin) classes.push("clickable");

    const k = fmtDate(d);
    // 연차 먼저, 근태 다음, 같은 종류 내에선 이름순
    const evts = (eventsByDate[k] || []).slice().sort((x, y) => {
      if (x.kind !== y.kind) return x.kind === "leave" ? -1 : 1;
      return x.data.empNo.localeCompare(y.data.empNo);
    });

    let evtHtml = "";
    evts.forEach(item => {
      if (item.kind === "leave") {
        const r = item.data;
        const emp = Store.getEmployee(r.empNo);
        const name = emp ? emp.name : r.empNo;
        let label, cls;
        if (r.status === "pending") {
          const typeText = r.days === 0.5 ? (r.halfDayPart === "AM" ? "오전반차" : "오후반차") : "연차";
          label = `[${typeText}]${name} 승인 대기 중`;
          cls = "pending";
        } else if (r.days === 0.5) {
          const part = r.halfDayPart === "AM" ? "오전반차" : "오후반차";
          label = `[${part}]${name}`;
          cls = "approved-half";
        } else {
          label = `[연차]${name}`;
          cls = "approved";
        }
        evtHtml += `<span class="cal-evt ${cls}" title="${escapeHtml(label)}">${escapeHtml(label)}</span>`;
      } else {
        const a = item.data;
        const emp = Store.getEmployee(a.empNo);
        const name = emp ? emp.name : a.empNo;
        const typeLabel = attTypeLabel(a.recordType);
        const cls = "att-" + a.recordType;
        const label = `[${typeLabel}]${name}`;
        const tooltip = label + (a.note ? " — " + a.note : "");
        evtHtml += `<span class="cal-evt ${cls}" title="${escapeHtml(tooltip)}">${escapeHtml(label)}</span>`;
      }
    });

    html += `<div class="${classes.join(" ")}" data-date="${k}"><div class="day">${d.getDate()}</div>${evtHtml}</div>`;
  }
  html += `</div>`;
  $("#calGrid").innerHTML = html;

  // 관리자 — 셀 클릭 시 그 날짜의 근태 기록 모달 (조회/수정/삭제/추가)
  if (isAdmin) {
    $$("#calGrid .cal-cell").forEach(cell => {
      cell.addEventListener("click", () => {
        openDayAttendanceModal(cell.dataset.date);
      });
    });
  }
}

pages.apply = function () {
  const u = currentUser();
  const bal = calcBalance(u);
  const policy = Store.getPolicy();
  const todayStr = fmtDate(today());

  $("#mainContent").innerHTML = `
    <h2 class="page-title">연차 신청</h2>
    <p class="page-sub">신청 후 관리자 승인을 거치면 사용 연차에 반영됩니다. (현재 잔여 ${bal.remaining}일)</p>
    <div class="card">
      <h3>신청서 작성</h3>
      <form id="applyForm">
        <div class="form-row cols-3">
          <div class="form-group">
            <label>사용 단위</label>
            <select id="unit" required>
              <option value="1">연차 (1일)</option>
              <option value="0.5">반차 (0.5일)</option>
            </select>
          </div>
          <div class="form-group" id="halfGroup" style="display:none;">
            <label>오전 / 오후</label>
            <select id="halfPart">
              <option value="AM">오전</option>
              <option value="PM">오후</option>
            </select>
          </div>
          <div class="form-group"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>신청 날짜</label>
            <input type="date" id="leaveDate" required ${policy.allowPastDate ? "" : `min="${todayStr}"`} />
            <div class="hint">한 번에 하루씩 신청합니다. 여러 날 쉬려면 날짜별로 따로 신청해 주세요.</div>
          </div>
          <div class="form-group"></div>
        </div>
        <div class="form-row cols-1">
          <div class="form-group">
            <label>사유</label>
            <textarea id="reason" placeholder="예: 개인 사유" required></textarea>
          </div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px;">
          <button type="button" class="btn ghost" id="cancelApply">취소</button>
          <button type="submit" class="btn green" id="submitApply">신청하기</button>
        </div>
      </form>
    </div>
  `;

  const unitSel = $("#unit");
  const halfGroup = $("#halfGroup");
  unitSel.addEventListener("change", () => {
    const half = unitSel.value === "0.5";
    halfGroup.style.display = half ? "" : "none";
  });

  $("#cancelApply").addEventListener("click", () => navigate("myLeave"));

  $("#applyForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const submitBtn = $("#submitApply");
    submitBtn.disabled = true;
    try {
      const unit = Number(unitSel.value);
      const dateVal = $("#leaveDate").value;
      const halfPart = unit === 0.5 ? $("#halfPart").value : null;
      const reason = $("#reason").value.trim();

      if (!dateVal) throw new Error("날짜를 선택해 주세요.");

      const days = unit; // 1일(연차) 또는 0.5일(반차)

      const bal2 = calcBalance(u);
      if (days > bal2.remaining) throw new Error(`잔여 연차(${bal2.remaining}일)보다 많이 신청할 수 없습니다.`);

      await Store.addRequest({
        empNo: u.empNo, startDate: dateVal, endDate: dateVal,
        days, halfDayPart: halfPart, reason,
      });

      alert("신청이 등록되었습니다. 관리자 승인을 기다려 주세요.");
      navigate("myLeave");
    } catch (err) {
      alert("신청 실패: " + (err.message || err));
      submitBtn.disabled = false;
    }
  });
};

function openDeleteEmployeeModal(empNo) {

  const adminCount = Store.getEmployees().filter(e => e.role === "admin").length;

    </p>
    <p style="font-size:13px; color:var(--gray-600); margin: 0 0 6px;">

        <input id="delConfirm" placeholder="${escapeHtml(emp.name)}" autocomplete="off" />
      </div>

        <button type="button" class="btn ghost" id="closeModal">취소</button>
        <button type="submit" class="btn danger" id="saveDel">영구 삭제</button>
      </div>
    </form>
  `;

        throw new Error("입력한 이름이 직원 이름과 일치하지 않습니다.");

      await Store.deleteEmployee(emp.empNo);
      closeModal();
      alert(`${emp.name} 직원이 삭제되었습니다.`);
      navigate("employees");
    } catch (err) {
      alert("삭제 실패: " + (err.message || err));
      btn.disabled = false;
    }
  });

function openAdjustBalanceModal(empNo) {
  const emp = Store.getEmployee(empNo);
  if (!emp) return alert("직원 정보를 찾을 수 없습니다.");
  const year = today().getFullYear();
  const granted = calcGrantedForYear(emp, year);
  const used = calcUsedForYear(emp.empNo, year);
  const adj = Number(emp.leaveAdjustment || 0);
  const currentRemain = Math.max(0, granted + adj - used);

  $("#modalBody").innerHTML = `
    <h3>잔여 연차 조정 — ${escapeHtml(emp.name)}</h3>
    <div style="background:var(--gray-50); padding:12px 14px; border-radius:8px; margin-bottom:16px; font-size:13px; line-height:1.8;">
      자동 부여(${year}년): <strong>${granted}일</strong><br/>
      현재 사용: <strong>${used}일</strong><br/>
      현재 조정값: <strong>${adj >= 0 ? "+" : ""}${adj}일</strong>
      <div style="margin-top:6px; padding-top:6px; border-top:1px solid var(--gray-200);">
        현재 잔여: <strong style="color:var(--green-600);">${currentRemain}일</strong>
      </div>
    </div>
    <form id="adjForm">
      <div class="form-group">
        <label>새 잔여 연차 *</label>
        <input id="newRemain" type="number" step="0.5" min="0" required value="${currentRemain}" />
        <div class="hint">입력한 값이 즉시 잔여 연차로 반영됩니다. (내부적으로 부여량을 조정해서 처리)</div>
      </div>
      <div class="actions">
        <button type="button" class="btn ghost" id="closeModal">취소</button>
        <button type="submit" class="btn green" id="saveAdj">저장</button>
      </div>
    </form>
  `;
  $("#modalBackdrop").classList.add("active");
  $("#closeModal").addEventListener("click", closeModal);

  $("#adjForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = $("#saveAdj");
    btn.disabled = true;
    try {
      const newRemain = Number($("#newRemain").value);
      if (isNaN(newRemain) || newRemain < 0) throw new Error("0 이상의 숫자를 입력해 주세요.");
      // 새 조정값 = 원하는 잔여 - (자동 부여 - 사용)
      const newAdj = newRemain - granted + used;
      await Store.updateEmployee(empNo, { leaveAdjustment: newAdj });
      closeModal();
      navigate("employees");
    } catch (err) {
      alert("저장 실패: " + (err.message || err));
      btn.disabled = false;
    }
  });
}

function renderLeaveRowHtml(r) {
  const emp = Store.getEmployee(r.empNo);

function renderDayAttendanceModal(dateStr) {
  const cu = currentUser();
  if (!cu || cu.role !== "admin") return;

  // 이 날에 걸쳐있는 연차/반차 (반려 제외)
  const leaves = Store.getRequests()
    .filter(r => r.status !== "rejected" && r.startDate <= dateStr && dateStr <= r.endDate)
    .sort((a, b) => {
      // pending 우선, 그 다음 이름순
      if (a.status !== b.status) return a.status === "pending" ? -1 : 1;
      const ae = Store.getEmployee(a.empNo);
      const be = Store.getEmployee(b.empNo);
      return (ae ? ae.name : a.empNo).localeCompare(be ? be.name : b.empNo, "ko");
    });

  const records = Store._cache.attendance
    .filter(a => a.recordDate === dateStr)
    .sort((a, b) => {
      const ae = Store.getEmployee(a.empNo);
      const be = Store.getEmployee(b.empNo);
      const an = ae ? ae.name : a.empNo;
      const bn = be ? be.name : b.empNo;
      return an.localeCompare(bn, "ko");
    });

  const employees = Store.getEmployees().slice().sort((a, b) => a.name.localeCompare(b.name, "ko"));

  const d = parseLocalDate(dateStr);
  const wdNames = ["일","월","화","수","목","금","토"];
  const wd = wdNames[d.getDay()];

  const leavesHtml = leaves.length === 0 ? "" : `
    <div style="margin-bottom:18px;">
      <div style="font-size:12px; color:var(--gray-600); font-weight:600; margin-bottom:8px;">연차 · 반차 (${leaves.length}건)</div>
      <div style="border:1px solid var(--gray-200); border-radius:8px; overflow:hidden;">${leaves.map(r => renderLeaveRowHtml(r)).join("")}</div>
    </div>`;

  const recordsHtml = records.length === 0 ? "" : `
    <div style="margin-bottom:18px;">
      <div style="font-size:12px; color:var(--gray-600); font-weight:600; margin-bottom:8px;">근태 기록 (${records.length}건)</div>
      <div style="border:1px solid var(--gray-200); border-radius:8px; overflow:hidden;">${records.map(r => renderAttRowHtml(r, employees)).join("")}</div>
    </div>`;

  // 위 섹션이 하나라도 있으면 추가 폼 위에 구분선
  const addFormStyle = (leaves.length || records.length) ? "border-top:1px solid var(--gray-200); padding-top:18px;" : "";

  $("#modalBody").innerHTML = `
    <h3>${dateStr} (${wd}) 일정</h3>
    ${leavesHtml}
    ${recordsHtml}

    <div style="${addFormStyle}">
      <div style="font-weight:600; font-size:13px; margin-bottom:10px;">+ 새 근태 기록 추가</div>
      <form id="dayAttAddForm">
        <div class="form-row">
          <div class="form-group">
            <label>직원 *</label>
            <select id="addAttEmp" required>
              <option value="">-- 선택 --</option>
              ${employees.map(e => `<option value="${escapeHtml(e.empNo)}">${escapeHtml(e.name)}</option>`).join("")}
            </select>
          </div>
          <div class="form-group">
            <label>유형 *</label>
            <select id="addAttType" required>
              <option value="late">지각</option>
              <option value="absent">결근</option>
              <option value="sick">병가</option>
              <option value="etc">기타</option>
            </select>
          </div>
        </div>
        <div class="form-row cols-1">
          <div class="form-group">
            <label>비고 <span id="addAttNoteReq" style="color:var(--red-500); display:none;">*</span></label>
            <input type="text" id="addAttNote" placeholder="예: 30분 지각, 사전 연락 없음" />
            <div class="hint" id="addAttNoteHint" style="display:none;">기타 유형은 비고가 필수입니다.</div>
          </div>
        </div>
        <div style="display:flex; justify-content:flex-end;">
          <button type="submit" class="btn green sm">+ 추가</button>
        </div>
      </form>
    </div>
  `;

  // 추가 폼: 유형 변경에 따라 비고 필수 표시 토글
  $("#addAttType").addEventListener("change", () => {
    const isEtc = $("#addAttType").value === "etc";
    $("#addAttNoteReq").style.display = isEtc ? "" : "none";
    $("#addAttNoteHint").style.display = isEtc ? "" : "none";
  });

  // 추가 폼: 제출
  $("#dayAttAddForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const empNo = $("#addAttEmp").value;
    const recordType = $("#addAttType").value;
    const note = $("#addAttNote").value.trim();
    if (!empNo) { alert("직원을 선택해 주세요."); return; }
    if (recordType === "etc" && !note) {
      alert("기타 유형은 비고를 반드시 입력해 주세요.");
      return;
    }
    try {
      await Store.addAttendance({
        empNo,
        recordDate: dateStr,
        recordType,
        note: note || null,
      });
      renderMonthCalendar();        // 달력 갱신 (배경)
      renderDayAttendanceModal(dateStr); // 모달 재렌더링
    } catch (err) {
      alert("추가 실패: " + (err.message || err));
    }
  });

  // 연차 행 액션 (승인/반려/수정/삭제)
  $("#modalBody").querySelectorAll("[data-leave-action]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const action = btn.dataset.leaveAction;
      const id = btn.dataset.leaveId;
      const r = Store.getRequests().find(x => x.id === id);
      if (!r) return;
      try {
        if (action === "approve") {
          const emp = Store.getEmployee(r.empNo);
          const bal = calcBalance(emp);
          if (r.days > bal.remaining) {
            if (!confirm(`현재 잔여(${bal.remaining}일)보다 신청 일수(${r.days}일)가 많습니다. 그래도 승인할까요?`)) return;
          }
          await Store.updateRequest(id, { status: "approved", approverEmpNo: cu.empNo, processedAt: new Date().toISOString() });
          renderMonthCalendar();
          renderDayAttendanceModal(dateStr);
        } else if (action === "reject") {
          await Store.updateRequest(id, { status: "rejected", approverEmpNo: cu.empNo, processedAt: new Date().toISOString() });
          renderMonthCalendar();
          renderDayAttendanceModal(dateStr);
        } else if (action === "delete") {
          if (!confirm("이 신청을 삭제할까요? 되돌릴 수 없습니다.")) return;
          await Store.deleteRequest(id);
          renderMonthCalendar();
          renderDayAttendanceModal(dateStr);
        } else if (action === "edit") {
          closeModal();
          openEditRequestModal(id);
        }
      } catch (err) {
        alert("처리 실패: " + (err.message || err));
      }
    });
  });

  // 근태 행 액션 버튼 (수정/저장/취소/삭제)
  $("#modalBody").querySelectorAll("[data-att-action]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const action = btn.dataset.attAction;
      const id = btn.dataset.attId;

      if (action === "edit") {
        _attEditingId = id;
        renderDayAttendanceModal(dateStr);
      } else if (action === "cancel") {
        _attEditingId = null;
        renderDayAttendanceModal(dateStr);
      } else if (action === "save") {
        const empNo      = $("#modalBody").querySelector(`.ed-emp[data-id="${id}"]`).value;
        const recordType = $("#modalBody").querySelector(`.ed-type[data-id="${id}"]`).value;
        const note       = $("#modalBody").querySelector(`.ed-note[data-id="${id}"]`).value.trim();
        if (!empNo) { alert("직원을 선택해 주세요."); return; }
        if (recordType === "etc" && !note) {
          alert("기타 유형은 비고를 반드시 입력해 주세요.");
          return;
        }
        try {
          await Store.updateAttendance(id, { empNo, recordType, note: note || null });
          _attEditingId = null;
          renderMonthCalendar();
          renderDayAttendanceModal(dateStr);
        } catch (err) {
          alert("저장 실패: " + (err.message || err));
        }
      } else if (action === "delete") {
        if (!confirm("이 근태 기록을 삭제할까요? 되돌릴 수 없습니다.")) return;
        try {
          await Store.deleteAttendance(id);
          renderMonthCalendar();
          renderDayAttendanceModal(dateStr);
        } catch (err) {
          alert("삭제 실패: " + (err.message || err));
        }
      }
    });
  });
}

/* ------------------ 직원 상세 모달 (탭: 기본정보 / 근태기록 / 면담일지) ------------------ */
function openEmployeeDetailModal(empNo, initialTab) {
  const emp = Store.getEmployee(empNo);
  if (!emp) return alert("직원 정보를 찾을 수 없습니다.");
  const cur = currentUser();
  const isAdmin = cur && cur.role === "admin";
  const tab = initialTab || "info";

  // 모달을 와이드 모드로
  $("#modalBackdrop .modal").classList.add("wide");

  $("#modalBody").innerHTML = `
    <h3 style="margin-bottom:6px;">${escapeHtml(emp.name)} <span style="font-size:12px; color:var(--gray-600); font-weight:500;">(${escapeHtml(emp.empNo)})</span></h3>
    <div class="tabs">
      <button data-tab="info"       class="${tab === "info"       ? "active" : ""}">기본정보</button>
      <button data-tab="attendance" class="${tab === "attendance" ? "active" : ""}">근태기록</button>
      ${isAdmin ? `<button data-tab="interviews" class="${tab === "interviews" ? "active" : ""}">면담일지</button>` : ""}
    </div>
    <div id="empDetailContent"></div>
  `;
  $("#modalBackdrop").classList.add("active");

  function renderTab(name) {
    $$(".tabs button").forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
    if (name === "info")             renderEmployeeInfoTab(empNo);
    else if (name === "attendance")  renderAttendanceTab(empNo);
    else if (name === "interviews" && isAdmin) renderInterviewTab(empNo);
  }
  $$(".tabs button").forEach((b) => {
    b.addEventListener("click", () => renderTab(b.dataset.tab));
  });
  renderTab(tab);
}

function renderEmployeeInfoTab(empNo) {
  const emp = Store.getEmployee(empNo);
  const cur = currentUser();
  const isAdmin = cur && cur.role === "admin";

  const row = (lbl, val) => `<div class="info-row"><div class="lbl">${lbl}</div><div class="val">${val}</div></div>`;

  $("#empDetailContent").innerHTML = `
    <div>
      ${row("이름", escapeHtml(emp.name))}
      ${row("아이디", escapeHtml(emp.empNo))}
      ${row("권한", emp.role === "admin" ? `<span class="badge role admin">관리자</span>` : `<span class="badge role">직원</span>`)}
      ${row("입사일", emp.hireDate)}
      ${row("이메일", emp.email ? escapeHtml(emp.email) : `<span style="color:var(--gray-400);">미입력</span>`)}
      ${row("휴대전화", emp.phone ? escapeHtml(emp.phone) : `<span style="color:var(--gray-400);">미입력</span>`)}
      ${row("직급", emp.position ? escapeHtml(emp.position) : `<span style="color:var(--gray-400);">미입력</span>`)}

        <button class="btn ghost sm" id="infoEdit">정보 수정</button>
        <button class="btn ghost sm" id="infoDelete" style="color:var(--red-500);">직원 삭제</button>
      </div>` : ""}
  `;

  if (isAdmin) {

function attTypeLabel(t) {
  return t === "late" ? "지각" : t === "absent" ? "무단결근" : t === "sick" ? "병가" : t === "etc" ? "기타" : t;
}
function attTypeBadge(t) {
  const cls = t === "late" ? "att-late" : t === "absent" ? "att-absent" : t === "sick" ? "att-sick" : "att-etc";
  return `<span class="badge ${cls}">${attTypeLabel(t)}</span>`;
}

          <div class="form-group">
            <label>날짜 *</label>
            <input type="date" id="attDate" required value="${fmtDate(today())}" />

          <div class="form-group">
            <label aria-hidden="true" style="visibility:hidden;">.</label>

        <div class="form-row cols-1">
          <div class="form-group">
            <label>비고 <span id="attNoteReq" style="color:var(--red-500); display:none;">*</span></label>

        meetingDate: $("#noteDate").value,
        title,
        content: $("#noteContent").value.trim() || null,

      alert("저장 실패: " + (err.message || err));

      if (!confirm("이 면담일지를 삭제할까요? 되돌릴 수 없습니다.")) return;
      btn.disabled = true;
      try {
        await Store.deleteInterviewNote(btn.dataset.delNote);

// 단, 액션 컬럼의 버튼 클릭은 stopPropagation으로 무시
function bindRequestRowClicks() {
  $$("tr.req-row").forEach((tr) => {
    tr.addEventListener("click", (e) => {
      if (e.target.closest("button")) return; // 버튼 클릭은 기존 핸들러로
      openRequestDetailModal(tr.dataset.reqId);
    });
  });
}

function openRequestDetailModal(id) {
  const r = Store.getRequests().find((x) => x.id === id);
  if (!r) return alert("신청 정보를 찾을 수 없습니다.");
  const emp = Store.getEmployee(r.empNo);
  const approver = r.approverEmpNo ? Store.getEmployee(r.approverEmpNo) : null;
  const range = r.days === 0.5
    ? `${r.startDate} (${r.halfDayPart === "AM" ? "오전" : "오후"} 반차)`
    : (r.startDate === r.endDate ? r.startDate : `${r.startDate} ~ ${r.endDate}`);
  let stateText, stateColor;
  if (r.status === "pending") { stateText = "대기"; stateColor = "var(--gray-600)"; }
  else if (r.status === "approved") { stateText = "승인"; stateColor = "var(--green-600)"; }
  else if (r.status === "rejected") { stateText = "반려"; stateColor = "var(--red-500)"; }
  const reasonText = (r.reason && r.reason !== "기존 데이터 이관") ? r.reason : "(사유 없음)";

  const row = (label, value) => `
    <div style="display:flex; padding:8px 0; border-bottom:1px solid var(--gray-100); font-size:13.5px;">
      <div style="width:90px; color:var(--gray-600); font-weight:600; flex-shrink:0;">${label}</div>
      <div style="flex:1;">${value}</div>
    </div>`;

  // 본인 + 대기 중이면 수정 가능 (관리자는 표의 '관리' 칼럼에서 수정)
  const u = currentUser();
  const canSelfEdit = u && r.empNo === u.empNo && r.status === "pending";
  const isAdmin = u && u.role === "admin";

  $("#modalBody").innerHTML = `
    <h3>신청 상세 정보</h3>
    <div>
      ${row("신청자", emp ? `${escapeHtml(emp.name)}` : escapeHtml(r.empNo))}
      ${row("기간", range)}
      ${row("일수", `${r.days}일`)}
      ${row("상태", `<span style="color:${stateColor}; font-weight:700;">${stateText}</span>`)}
      ${row("신청일", fmtDate(r.requestedAt))}
      ${isAdmin ? row("처리일", r.processedAt ? fmtDate(r.processedAt) : "-") : ""}
      ${isAdmin ? row("처리자", approver ? escapeHtml(approver.name) : "-") : ""}
      <div style="padding:10px 0 0;">
        <div style="color:var(--gray-600); font-weight:600; font-size:13.5px; margin-bottom:6px;">사유</div>
        <div style="background:var(--gray-50); padding:12px 14px; border-radius:8px; font-size:13.5px; line-height:1.6; white-space:pre-wrap; word-break:break-word;">${escapeHtml(reasonText)}</div>
      </div>
    </div>
    ${canSelfEdit ? `
    <div class="actions">
      <button type="button" class="btn green" id="detailSelfEdit">수정하기</button>
    </div>` : ""}
  `;
  $("#modalBackdrop").classList.add("active");

  if (canSelfEdit) {
    $("#detailSelfEdit").addEventListener("click", () => {
      closeModal();
      openEditRequestModal(id, { hideStatus: true });
    });
  }
}

function openEditRequestModal(id, opts) {
  const { hideStatus = false } = opts || {};
  const r = Store.getRequests().find(x => x.id === id);
  if (!r) return alert("신청 정보를 찾을 수 없습니다.");
  const emp = Store.getEmployee(r.empNo);
  const isHalf = Number(r.days) === 0.5;

  const statusBlock = hideStatus ? `<div class="form-group"></div>` : `
        <div class="form-group">
          <label>상태</label>
          <select id="erStatus">
            <option value="approved" ${r.status === "approved" ? "selected" : ""}>승인</option>
            <option value="pending" ${r.status === "pending" ? "selected" : ""}>대기 중</option>
            <option value="rejected" ${r.status === "rejected" ? "selected" : ""}>반려</option>
          </select>
        </div>`;

  $("#modalBody").innerHTML = `
    <h3>신청 수정 — ${emp ? escapeHtml(emp.name) : escapeHtml(r.empNo)}</h3>
    <form id="editReqForm">
      <div class="form-row cols-3">
        <div class="form-group">
          <label>사용 단위</label>
          <select id="erUnit">
            <option value="1" ${!isHalf ? "selected" : ""}>연차 (1일)</option>
            <option value="0.5" ${isHalf ? "selected" : ""}>반차 (0.5일)</option>
          </select>
        </div>
        <div class="form-group" id="erHalfGroup" style="${isHalf ? "" : "display:none;"}">
          <label>오전 / 오후</label>
          <select id="erHalfPart">
            <option value="AM" ${r.halfDayPart === "AM" ? "selected" : ""}>오전</option>
            <option value="PM" ${r.halfDayPart === "PM" ? "selected" : ""}>오후</option>
          </select>
        </div>
        <div class="form-group"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>날짜 *</label>
          <input id="erDate" type="date" required value="${r.startDate}" />
        </div>
        ${statusBlock}
      </div>
      <div class="form-row cols-1">
        <div class="form-group">
          <label>사유</label>
          <textarea id="erReason">${escapeHtml(r.reason || "")}</textarea>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="btn ghost" id="closeModal">취소</button>
        <button type="submit" class="btn green" id="saveEdReq">저장</button>
      </div>
    </form>
  `;
  $("#modalBackdrop").classList.add("active");
  $("#closeModal").addEventListener("click", closeModal);

  $("#erUnit").addEventListener("change", () => {
    const half = $("#erUnit").value === "0.5";
    $("#erHalfGroup").style.display = half ? "" : "none";
  });

  $("#editReqForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = $("#saveEdReq");

    try {
      const unit = Number($("#erUnit").value);
      const dateVal = $("#erDate").value;
      if (!dateVal) throw new Error("날짜를 선택해 주세요.");
      const halfPart = unit === 0.5 ? $("#erHalfPart").value : null;
      const reason = $("#erReason").value.trim();

      const patch = {
        startDate: dateVal,
        endDate: dateVal,
        days: unit,
        halfDayPart: halfPart,
        reason,
      };
      // 상태 select가 있는 경우(관리자)만 status 함께 변경
      const statusEl = $("#erStatus");
      if (statusEl) patch.status = statusEl.value;

      await Store.updateRequest(id, patch);
      closeModal();
      // 현재 페이지를 새로고침 (myLeave에서 수정했으면 myLeave로, approvals에서 수정했으면 approvals로)
      const activeBtn = document.querySelector("#nav button.active");
      navigate(activeBtn ? activeBtn.dataset.page : "myLeave");
    } catch (err) {
      alert("저장 실패: " + (err.message || err));
      btn.disabled = false;
    }
  });
}

pages.approvals = function () {
  const u = currentUser();
  if (u.role !== "admin") return navigate("home");
  const all = Store.getRequests();
  const pendings = all.filter((r) => r.status === "pending");
  const processed = all.filter((r) => r.status !== "pending");

  $("#mainContent").innerHTML = `
    <h2 class="page-title">연차 승인</h2>
    <p class="page-sub">대기 중인 신청을 승인하거나 반려합니다.</p>
    <div class="card">
      <h3>승인 대기 (${pendings.length}건)</h3>
      ${pendings.length ? renderRequestTable(pendings, { showEmp: true, showActions: true }) : `<div class="empty">대기 중인 신청이 없습니다.</div>`}
    </div>
    <div class="card">
      <h3>처리 완료 내역 (${processed.length}건)</h3>
      ${processed.length ? renderRequestTable(processed, { showEmp: true, showActions: false, showEdit: true }) : `<div class="empty">처리된 내역이 없습니다.</div>`}
    </div>
  `;

  $$("button[data-edit-req]").forEach((btn) => {
    btn.addEventListener("click", () => openEditRequestModal(btn.dataset.editReq));
  });
  $$("button[data-del-req]").forEach((btn) => {
    btn.addEventListener("click", () => openDeleteRequestModal(btn.dataset.delReq));
  });
  bindRequestRowClicks();

  $$("button[data-act]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      const r = Store.getRequests().find((x) => x.id === id);
      if (!r) return;
      btn.disabled = true;
      try {
        if (act === "approve") {
          const emp = Store.getEmployee(r.empNo);
          const bal = calcBalance(emp);
          if (r.days > bal.remaining) {
            if (!confirm(`현재 잔여(${bal.remaining}일)보다 신청 일수(${r.days}일)가 많습니다. 그래도 승인할까요?`)) {
              btn.disabled = false; return;
            }
          }
          await Store.updateRequest(id, { status: "approved", approverEmpNo: u.empNo, processedAt: new Date().toISOString() });
        } else if (act === "reject") {
          await Store.updateRequest(id, { status: "rejected", approverEmpNo: u.empNo, processedAt: new Date().toISOString() });
        }
        navigate("approvals");
      } catch (err) {
        alert("처리 실패: " + (err.message || err));
        btn.disabled = false;
      }
    });
  });
};

/* ------------------ 14. 공통: 신청 테이블 ------------------ */
function renderRequestTable(reqs, opts) {
  const { showEmp, showActions, showEdit, showSelfEdit } = opts || {};
  return `<table>
    <thead><tr>
      <th>신청일</th>
      ${showEmp ? "<th>신청자</th>" : ""}
      <th>기간</th><th>일수</th><th>상태</th>
      ${showActions ? "<th style=''>처리</th>"
        : showSelfEdit ? "<th style=''>관리</th>"
        : showEdit ? "<th>처리일</th><th style=''>관리</th>"
        : "<th>처리일</th>"}
    </tr></thead>
    <tbody>
    ${reqs.map((r) => {
      const emp = Store.getEmployee(r.empNo);
      const range = r.startDate === r.endDate ? r.startDate : `${r.startDate} ~ ${r.endDate}`;
      let badge = "";
      if (r.status === "pending") badge = `<span class="badge pending">대기</span>`;
      else if (r.status === "approved" && r.days === 0.5) badge = `<span class="badge approved-half">승인</span>`;
      else if (r.status === "approved") badge = `<span class="badge approved">승인</span>`;
      else if (r.status === "rejected") badge = `<span class="badge rejected">반려</span>`;

      let lastCol;
      if (showActions) {
        lastCol = `<td style="">
             <span class="actions-cell">
               <button class="btn green sm" data-act="approve" data-id="${r.id}">승인</button>
               <button class="btn danger sm" data-act="reject"  data-id="${r.id}">반려</button>
             </span>
           </td>`;
      } else if (showSelfEdit) {
        lastCol = `<td style="">
             <span class="actions-cell">
               <button class="btn ghost xs" data-self-edit="${r.id}">수정</button>
             </span>
           </td>`;
      } else if (showEdit) {
        lastCol = `<td>${r.processedAt ? fmtDate(r.processedAt) : "-"}</td>
           <td style="">
             <span class="actions-cell">
               <button class="btn ghost xs" data-edit-req="${r.id}">수정</button>
               <button class="btn ghost xs" style="color:var(--red-500);" data-del-req="${r.id}">삭제</button>
             </span>
           </td>`;
      } else {
        lastCol = `<td>${r.processedAt ? fmtDate(r.processedAt) : "-"}</td>`;
      }

      return `<tr data-req-id="${r.id}" class="req-row" title="클릭하면 상세 정보를 볼 수 있습니다">
        <td style="white-space:nowrap;">${fmtDate(r.requestedAt)}</td>
        ${showEmp ? `<td style="font-weight:600; white-space:nowrap;">${emp ? escapeHtml(emp.name) : escapeHtml(r.empNo)}</td>` : ""}
        <td style="white-space:nowrap;">${range}</td>
        <td style="white-space:nowrap;">${r.days}일</td>
        <td style="white-space:nowrap;">${badge}</td>
        ${lastCol}
      </tr>`;
    }).join("")}
    </tbody></table>`;
}

    );

    }

$("#signupInfoForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = $("#suInfoErr");
  errEl.textContent = "";
  const btn = $("#suCompleteBtn");
  btn.disabled = true;
  try {
    if (!_signupMatchedEmp) throw new Error("매칭 정보가 없습니다. 다시 시도해 주세요.");
    const newU = $("#suUsername").value.trim();
    const email = $("#suEmail").value.trim();
    const phone = formatPhoneNumber($("#suPhone").value);
    const pw = $("#suPw").value;
    const pw2 = $("#suPw2").value;

    if (!newU) throw new Error("아이디를 입력해 주세요.");
    if (!email) throw new Error("이메일을 입력해 주세요.");
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) throw new Error("이메일 형식이 올바르지 않습니다.");
    if (!isValidPhone(phone)) throw new Error("휴대전화는 000-0000-0000 형태로 입력해 주세요.");
    if (pw.length < 4) throw new Error("비밀번호는 최소 4자 이상이어야 합니다.");
    if (pw !== pw2) throw new Error("비밀번호 확인이 일치하지 않습니다.");

    // 새 아이디 중복 체크
    if (newU !== _signupMatchedEmp.empNo && Store.getEmployee(newU)) {
      throw new Error("이미 사용 중인 아이디입니다.");
    }

    // 1) 임시 username을 새 username으로 변경 + 이메일·전화번호 업데이트
    await Store.updateEmployee(_signupMatchedEmp.empNo, {
      empNo: newU,
      email,
      phone,
    });
    // 2) 비밀번호 진짜 hash로 덮어쓰기
    await Store.updateEmployeePassword(newU, await hashPassword(pw));
    // 3) 세션 설정 후 앱으로
    Store.setSession(newU);
    await Store.refresh();
    showApp();
  } catch (err) {
    errEl.textContent = err.message || err;
    btn.disabled = false;
  }
});

    showApp();
  } else {
    showLogin();
  }
})();
</script>
