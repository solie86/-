<style>
  /* ============================================================
     디자인 토큰 — 화이트 / 네이비 / 그린 포인트
     ============================================================ */
  :root {

  .main { flex: 1; padding: 28px 36px; overflow-x: auto; }

  /* 공통 카드/통계/버튼/폼/테이블/뱃지 */
  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 22px; margin-bottom: 18px; }

  table th { color: var(--gray-600); font-weight: 600; background: var(--gray-50); font-size: 12px; }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }

  .info-banner { background: #eff5ff; border: 1px solid #d6e4ff; color: var(--navy-700); padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .err-banner { background: #fdebeb; border: 1px solid #f5c6c6; color: #8b2929; padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .empty { padding: 32px; text-align: center; color: var(--gray-400); font-size: 13px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }

  /* 반응형 */
  @media (max-width: 768px) {
    .app.active { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 12px 14px; overflow-x: auto; }

  /* 모달 */

</style>

<script>
/* ==================================================================
   사내 연차 관리 시스템 — Supabase 연동 버전
   - 데이터: Supabase (PostgreSQL)
   - 인증: 사번 + 비밀번호 (SHA-256 해시, employees 테이블)
   - 세션 유지: localStorage (브라우저별)
   ================================================================== */

/* ------------------ 0. Supabase 연결 ------------------ */
const SUPABASE_URL = "https://ndfboobqkgdkieitskgo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZmJvb2Jxa2dka2llaXRza2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjgyNjEsImV4cCI6MjA5NTA0NDI2MX0.LV4ZVD5Re-_A9uA3hioWPdIDGGitkJmKkwlRVvmm250";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ------------------ 1. 유틸 ------------------ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const fmtDate = (d) => {
  if (!d) return "-";
  if (!(d instanceof Date)) d = new Date(d);
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
};
const today = () => new Date();

async function hashPassword(pw) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest("SHA-256", enc.encode(pw));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}

/* ------------------ 2. DB ↔ JS 필드 변환 (snake_case ↔ camelCase) ------------------ */
const dbToEmp = (r) => r && ({
  empNo: r.emp_no, name: r.name, email: r.email,
  hireDate: r.hire_date, position: r.position, department: r.department,
  passwordHash: r.password_hash, role: r.role,
});
const empToDb = (e) => ({
  emp_no: e.empNo, name: e.name, email: e.email,
  hire_date: e.hireDate, position: e.position, department: e.department,
  password_hash: e.passwordHash, role: e.role,
});
const dbToReq = (r) => r && ({
  id: r.id, empNo: r.emp_no, requestedAt: r.requested_at,
  startDate: r.start_date, endDate: r.end_date,
  days: Number(r.days), halfDayPart: r.half_day_part,
  reason: r.reason, status: r.status,
  approverEmpNo: r.approver_emp_no, processedAt: r.processed_at,
});
const dbToPolicy = (r) => r ? ({
  monthlyAccrual: Number(r.monthly_accrual),
  yearOneBulk: Number(r.year_one_bulk),
  allowPastDate: r.allow_past_date,
}) : { monthlyAccrual: 1, yearOneBulk: 15, allowPastDate: true };

/* ------------------ 3. 저장 모듈 (Supabase) ------------------
   - 읽기: refresh() 후 캐시에서 동기 접근
   - 쓰기: 비동기로 DB에 반영 후 자동 refresh()
   ----------------------------------------------------------- */
const Store = {
  _cache: { employees: [], requests: [], policy: null },

  async refresh() {
    const [empsRes, reqsRes, polRes] = await Promise.all([
      sb.from("employees").select("*").order("emp_no"),
      sb.from("leave_requests").select("*").order("requested_at", { ascending: false }),
      sb.from("policy").select("*").eq("id", 1).maybeSingle(),
    ]);
    if (empsRes.error) throw empsRes.error;
    if (reqsRes.error) throw reqsRes.error;
    if (polRes.error) throw polRes.error;
    this._cache.employees = (empsRes.data || []).map(dbToEmp);
    this._cache.requests  = (reqsRes.data  || []).map(dbToReq);
    this._cache.policy    = dbToPolicy(polRes.data);
  },

  // 동기 읽기
  getEmployees() { return this._cache.employees; },
  getEmployee(empNo) { return this._cache.employees.find((e) => e.empNo === empNo); },
  getRequests() { return this._cache.requests; },
  getRequestsByEmp(empNo) { return this._cache.requests.filter((r) => r.empNo === empNo); },
  getPolicy() { return this._cache.policy; },

  // 비동기 쓰기
  async addEmployee(emp) {
    const { error } = await sb.from("employees").insert(empToDb(emp));
    if (error) throw error;
    await this.refresh();
  },
  async addRequest(req) {
    const row = {
      emp_no: req.empNo,
      start_date: req.startDate,
      end_date: req.endDate,
      days: req.days,
      half_day_part: req.halfDayPart,
      reason: req.reason,
      status: "pending",
    };
    const { error } = await sb.from("leave_requests").insert(row);
    if (error) throw error;
    await this.refresh();
  },
  async updateRequest(id, patch) {
    const row = {};
    if ("status" in patch) row.status = patch.status;
    if ("approverEmpNo" in patch) row.approver_emp_no = patch.approverEmpNo;
    if ("processedAt" in patch) row.processed_at = patch.processedAt;
    const { error } = await sb.from("leave_requests").update(row).eq("id", id);
    if (error) throw error;
    await this.refresh();
  },

  // 세션 (브라우저 로컬)
  setSession(empNo) { localStorage.setItem("leave_session_v2", empNo); },
  getSession() {
    const s = localStorage.getItem("leave_session_v2");
    return s ? { empNo: s } : null;
  },
  clearSession() { localStorage.removeItem("leave_session_v2"); },
};

/* ------------------ 4. 연차 발생 계산 로직 ------------------ */
function calcGrantedForYear(emp, year, asOf = today()) {
  const policy = Store.getPolicy();
  const hireDate = new Date(emp.hireDate);
  const yearEnd = new Date(year, 11, 31, 23, 59, 59);
  const ref = asOf < yearEnd ? asOf : yearEnd;
  if (hireDate > new Date(year, 11, 31)) return 0;

  let granted = 0;
  for (let m = 0; m < 12; m++) {
    const eventDate = new Date(year, m, 1);
    if (eventDate > ref) break;
    const prevMonthStart = new Date(year, m - 1, 1);
    if (hireDate <= prevMonthStart) granted += policy.monthlyAccrual;
  }
  const oneYearAnniv = new Date(hireDate);
  oneYearAnniv.setFullYear(oneYearAnniv.getFullYear() + 1);
  if (oneYearAnniv.getFullYear() === year && oneYearAnniv <= ref) {
    granted += policy.yearOneBulk;
  }
  return granted;
}
function calcUsedForYear(empNo, year) {
  return Store.getRequests()
    .filter((r) => r.empNo === empNo && r.status === "approved")
    .filter((r) => new Date(r.startDate).getFullYear() === year)
    .reduce((sum, r) => sum + Number(r.days || 0), 0);
}
function calcBalance(emp, year = today().getFullYear()) {
  const granted = calcGrantedForYear(emp, year);
  const used = calcUsedForYear(emp.empNo, year);
  return { granted, used, remaining: Math.max(0, granted - used) };
}

/* ------------------ 5. 인증 ------------------ */
async function login(empNo, pw) {
  await Store.refresh();
  const emp = Store.getEmployee(empNo);
  if (!emp) return { ok: false, msg: "사번을 찾을 수 없습니다." };
  const h = await hashPassword(pw);
  if (h !== emp.passwordHash) return { ok: false, msg: "비밀번호가 올바르지 않습니다." };
  Store.setSession(empNo);
  return { ok: true, emp };
}
function currentUser() {
  const s = Store.getSession();
  return s ? Store.getEmployee(s.empNo) : null;
}

const pages = {};
async function navigate(page) {
  $$("#nav button").forEach((b) => b.classList.toggle("active", b.dataset.page === page));
  const u = currentUser();
  if (!u) return;
  if (["employees", "approvals"].includes(page) && u.role !== "admin") page = "home";

  $("#mainContent").innerHTML = `<div class="empty"><div class="spinner" style="display:inline-block; width:18px; height:18px; border:2px solid var(--gray-200); border-top-color: var(--navy-500); border-radius:50%; animation: spin .8s linear infinite; vertical-align:middle; margin-right:8px;"></div>불러오는 중…</div>`;
  try {
    await Store.refresh();
  } catch (e) {
    $("#mainContent").innerHTML = `<div class="err-banner">데이터 불러오기 실패: ${escapeHtml(e.message || e)}</div>`;
    return;
  }
  const fn = pages[page] || pages.home;
  $("#mainContent").innerHTML = "";
  fn();
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

pages.apply = function () {
  const u = currentUser();

  const todayStr = fmtDate(today());

  $("#mainContent").innerHTML = `
    <h2 class="page-title">연차 신청</h2>
    <p class="page-sub">신청 후 관리자 승인을 거치면 사용 연차에 반영됩니다.</p>
    <div class="info-banner">현재 잔여 연차 <strong>${bal.remaining}일</strong> · 되도록 빠른 신청을 권장합니다.</div>
    <div class="card">
      <h3>신청서 작성</h3>
      <form id="applyForm">
        <div class="form-row cols-3">
          <div class="form-group">
            <label>사용 단위</label>
            <select id="unit" required>
              <option value="1">연차 (1일)</option>
              <option value="0.5">반차 (0.5일)</option>
            </select>
          </div>
          <div class="form-group" id="halfGroup" style="display:none;">
            <label>오전 / 오후</label>
            <select id="halfPart">
              <option value="AM">오전</option>
              <option value="PM">오후</option>
            </select>
          </div>
          <div class="form-group"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>시작일</label>
            <input type="date" id="startDate" required ${policy.allowPastDate ? "" : `min="${todayStr}"`} />
          </div>
          <div class="form-group" id="endGroup">
            <label>종료일</label>
            <input type="date" id="endDate" required ${policy.allowPastDate ? "" : `min="${todayStr}"`} />
          </div>
        </div>
        <div class="form-row cols-1">
          <div class="form-group">
            <label>사유</label>
            <textarea id="reason" placeholder="예: 개인 사유" required></textarea>
          </div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px;">
          <button type="button" class="btn ghost" id="cancelApply">취소</button>
          <button type="submit" class="btn green" id="submitApply">신청하기</button>
        </div>
      </form>
    </div>
  `;

  const unitSel = $("#unit");
  const halfGroup = $("#halfGroup");
  const endGroup = $("#endGroup");
  unitSel.addEventListener("change", () => {
    const half = unitSel.value === "0.5";
    halfGroup.style.display = half ? "" : "none";
    endGroup.style.display = half ? "none" : "";
  });

  $("#cancelApply").addEventListener("click", () => navigate("myLeave"));

  $("#applyForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const submitBtn = $("#submitApply");
    submitBtn.disabled = true;
    try {
      const unit = Number(unitSel.value);
      const start = $("#startDate").value;
      let end = unit === 0.5 ? start : $("#endDate").value;
      const halfPart = unit === 0.5 ? $("#halfPart").value : null;
      const reason = $("#reason").value.trim();

      if (!start || !end) throw new Error("날짜를 입력해 주세요.");
      if (new Date(end) < new Date(start)) throw new Error("종료일이 시작일보다 빠를 수 없습니다.");

      let days;
      if (unit === 0.5) days = 0.5;
      else {
        const ms = new Date(end) - new Date(start);
        days = Math.round(ms / 86400000) + 1;
      }

      const bal2 = calcBalance(u);
      if (days > bal2.remaining) throw new Error(`잔여 연차(${bal2.remaining}일)보다 많이 신청할 수 없습니다.`);

      await Store.addRequest({
        empNo: u.empNo,
        startDate: start,
        endDate: end,
        days,
        halfDayPart: halfPart,
        reason,
      });

      alert("신청이 등록되었습니다. 관리자 승인을 기다려 주세요.");
      navigate("myLeave");
    } catch (err) {
      alert("신청 실패: " + (err.message || err));
      submitBtn.disabled = false;
    }
  });
};

pages.approvals = function () {
  const u = currentUser();
  if (u.role !== "admin") return navigate("home");
  const all = Store.getRequests();
  const pendings = all.filter((r) => r.status === "pending");
  const processed = all.filter((r) => r.status !== "pending");

  $("#mainContent").innerHTML = `
    <h2 class="page-title">승인 관리</h2>
    <p class="page-sub">대기 중인 신청을 승인하거나 반려합니다.</p>
    <div class="card">
      <h3>승인 대기 (${pendings.length}건)</h3>
      ${pendings.length ? renderRequestTable(pendings, { showEmp: true, showActions: true }) : `<div class="empty">대기 중인 신청이 없습니다.</div>`}
    </div>
    <div class="card">
      <h3>처리 완료 내역 (${processed.length}건)</h3>
      ${processed.length ? renderRequestTable(processed, { showEmp: true, showActions: false }) : `<div class="empty">처리된 내역이 없습니다.</div>`}
    </div>
  `;

  $$("button[data-act]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      const r = Store.getRequests().find((x) => x.id === id);
      if (!r) return;
      btn.disabled = true;
      try {
        if (act === "approve") {
          const emp = Store.getEmployee(r.empNo);
          const bal = calcBalance(emp);
          if (r.days > bal.remaining) {
            if (!confirm(`현재 잔여(${bal.remaining}일)보다 신청 일수(${r.days}일)가 많습니다. 그래도 승인할까요?`)) {
              btn.disabled = false; return;
            }
          }
          await Store.updateRequest(id, { status: "approved", approverEmpNo: u.empNo, processedAt: new Date().toISOString() });
        } else if (act === "reject") {
          await Store.updateRequest(id, { status: "rejected", approverEmpNo: u.empNo, processedAt: new Date().toISOString() });
        }
        navigate("approvals");
      } catch (err) {
        alert("처리 실패: " + (err.message || err));
        btn.disabled = false;
      }
    });
  });
};

/* ------------------ 13. 공통: 신청 테이블 ------------------ */
function renderRequestTable(reqs, opts) {
  const { showEmp, showActions } = opts || {};
  return `<table>
    <thead><tr>
      <th>신청일</th>
      ${showEmp ? "<th>신청자</th>" : ""}
      <th>기간</th><th>일수</th><th>사유</th><th>상태</th>
      ${showActions ? "<th style='text-align:right;'>처리</th>" : "<th>처리일</th>"}
    </tr></thead>
    <tbody>
    ${reqs.map((r) => {
      const emp = Store.getEmployee(r.empNo);
      const range = r.days === 0.5
        ? `${r.startDate} (${r.halfDayPart === "AM" ? "오전" : "오후"} 반차)`
        : (r.startDate === r.endDate ? r.startDate : `${r.startDate} ~ ${r.endDate}`);
      let badge = "";
      if (r.status === "pending") badge = `<span class="badge pending">대기 중</span>`;
      else if (r.status === "approved" && r.days === 0.5) badge = `<span class="badge approved-half">반차 승인</span>`;
      else if (r.status === "approved") badge = `<span class="badge approved">승인</span>`;
      else if (r.status === "rejected") badge = `<span class="badge rejected">반려</span>`;
      const lastCol = showActions
        ? `<td style="text-align:right;">
             <button class="btn green sm" data-act="approve" data-id="${r.id}">승인</button>
             <button class="btn danger sm" data-act="reject"  data-id="${r.id}">반려</button>
           </td>`
        : `<td>${r.processedAt ? fmtDate(r.processedAt) : "-"}</td>`;
      return `<tr>
        <td>${fmtDate(r.requestedAt)}</td>
        ${showEmp ? `<td>${emp ? escapeHtml(emp.name) : escapeHtml(r.empNo)} <span style="color:var(--gray-400);font-size:11px;">(${escapeHtml(r.empNo)})</span></td>` : ""}
        <td>${range}</td>
        <td>${r.days}일</td>
        <td style="max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(r.reason || "")}">${escapeHtml(r.reason || "-")}</td>
        <td>${badge}</td>
        ${lastCol}
      </tr>`;
    }).join("")}
    </tbody></table>`;
}

        <div style="max-width:500px; padding:24px; background:white; color:var(--gray-800); border-radius:12px;">

          <p style="font-size:12px; color:var(--gray-600);">URL/Key 가 정확한지, Supabase 프로젝트가 활성 상태인지 확인해 주세요.</p>
        </div>
      </div>`;
    return;
  }

  // 직원이 한 명도 없으면 초기 관리자 설정
  if (Store.getEmployees().length === 0) {
    showSetup();
    return;
  }

  const s = Store.getSession();
  if (s && Store.getEmployee(s.empNo)) {
    showApp();
  } else {
    showLogin();
  }
})();
</script>
</body>
</html>
