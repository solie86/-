<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>사내 연차 관리 시스템</title>

<!-- Supabase JS Client (CDN) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  :root {
    --navy-900: #0f1f3d; --navy-700: #1e3a5f; --navy-500: #345078;
    --green-500: #2f9e6b; --green-600: #237a52;
    --yellow-500: #e4b53a;
    --gray-50:  #f6f7fb; --gray-100: #eceff5; --gray-200: #dfe3eb;
    --gray-400: #9aa3b2; --gray-600: #555f72; --gray-800: #232a36;
    --red-500: #d44a4a;
    --white: #ffffff;
    --shadow-sm: 0 1px 2px rgba(15,31,61,0.06);
    --shadow-md: 0 4px 16px rgba(15,31,61,0.08);
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR",
                 "Apple SD Gothic Neo", "Segoe UI", Roboto, sans-serif;
    background: var(--gray-50); color: var(--gray-800);
    line-height: 1.5; font-size: 14px;
  }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: 14px; }
  a { color: inherit; text-decoration: none; }

  .boot-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy-900), var(--navy-500));
    color: white; font-size: 14px;
  }
  .boot-wrap .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .login-wrap {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--navy-900), var(--navy-500));
    padding: 24px;
  }
  .login-card {
    width: 100%; max-width: 420px;
    background: var(--white); border-radius: 16px;
    padding: 36px 32px; box-shadow: 0 12px 40px rgba(0,0,0,0.2);
  }
  .login-card h1 { margin: 0 0 6px; font-size: 22px; color: var(--navy-900); }
  .login-card .sub { margin: 0 0 24px; color: var(--gray-600); font-size: 13px; }
  .login-card label {
    display: block; margin: 12px 0 4px;
    font-size: 12px; color: var(--gray-600); font-weight: 600;
  }
  .login-card input, .login-card select {
    width: 100%; padding: 11px 13px;
    border: 1px solid var(--gray-200); border-radius: 8px;
    outline: none; transition: border-color .15s;
  }
  .login-card input:focus, .login-card select:focus { border-color: var(--navy-500); }
  .login-card .btn-primary {
    width: 100%; margin-top: 18px; padding: 12px;
    background: var(--navy-900); color: var(--white);
    border: none; border-radius: 8px;
    font-weight: 600; font-size: 14px;
  }
  .login-card .btn-primary:hover { background: var(--navy-700); }
  .login-card .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-card .err {
    margin-top: 12px; color: var(--red-500); font-size: 12px; min-height: 16px;
  }
  .login-card .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .app { display: none; min-height: 100vh; }
  .app.active { display: flex; }
  .sidebar {
    width: 220px; background: var(--navy-900); color: var(--white);
    padding: 24px 0; display: flex; flex-direction: column; flex-shrink: 0;
  }
  .sidebar .brand { padding: 0 22px 18px; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 16px; }
  .sidebar .brand h2 { margin: 0; font-size: 16px; font-weight: 700; }
  .sidebar .brand p { margin: 4px 0 0; font-size: 11px; color: rgba(255,255,255,0.55); }
  .sidebar nav { flex: 1; padding: 0 12px; }
  .sidebar nav button {
    display: block; width: 100%; text-align: left;
    background: transparent; color: rgba(255,255,255,0.78);
    border: none; padding: 11px 14px; border-radius: 8px;
    font-size: 13px; margin-bottom: 2px;
    transition: background .15s, color .15s;
  }
  .sidebar nav button:hover { background: rgba(255,255,255,0.06); color: var(--white); }
  .sidebar nav button.active { background: var(--green-500); color: var(--white); font-weight: 600; }
  .sidebar nav .section {
    margin: 14px 14px 6px;
    font-size: 10px; color: rgba(255,255,255,0.4);
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .sidebar .user-box {
    padding: 14px 22px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 12px;
  }
  .sidebar .user-box .name { font-weight: 600; }
  .sidebar .user-box .role { color: rgba(255,255,255,0.55); margin-top: 2px; }
  .sidebar .user-box button {
    margin-top: 8px; width: 100%;
    background: transparent; color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 6px; border-radius: 6px; font-size: 12px;
  }
  .sidebar .user-box button:hover { background: rgba(255,255,255,0.06); }

  .main { flex: 1; padding: 28px 36px; overflow-x: auto; }
  .page-title { font-size: 22px; font-weight: 700; color: var(--navy-900); margin: 0 0 4px; }
  .page-sub { color: var(--gray-600); font-size: 13px; margin: 0 0 24px; }

  .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow-sm); padding: 22px; margin-bottom: 18px; }
  .card h3 { margin: 0 0 14px; font-size: 15px; color: var(--navy-900); }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow-sm); border-left: 4px solid var(--navy-500); }
  .stat-card.green { border-left-color: var(--green-500); }
  .stat-card.yellow { border-left-color: var(--yellow-500); }
  .stat-card .label { color: var(--gray-600); font-size: 12px; margin-bottom: 6px; }
  .stat-card .value { font-size: 26px; font-weight: 700; color: var(--navy-900); }
  .stat-card .unit { font-size: 13px; color: var(--gray-600); font-weight: 500; margin-left: 4px; }

  .btn { background: var(--navy-900); color: var(--white); border: none; padding: 9px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; }
  .btn:hover { background: var(--navy-700); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn.ghost { background: transparent; color: var(--navy-700); border: 1px solid var(--gray-200); }
  .btn.ghost:hover { background: var(--gray-50); }
  .btn.green { background: var(--green-500); }
  .btn.green:hover { background: var(--green-600); }
  .btn.danger { background: var(--red-500); }
  .btn.danger:hover { background: #b53b3b; }
  .btn.sm { padding: 6px 11px; font-size: 12px; }
  .btn.xs { padding: 4px 8px; font-size: 11px; }

  .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 12px; }
  .form-row.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .form-row.cols-1 { grid-template-columns: 1fr; }
  .form-group label { display: block; font-size: 12px; color: var(--gray-600); font-weight: 600; margin-bottom: 4px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 9px 11px;
    border: 1px solid var(--gray-200); border-radius: 7px;
    outline: none; background: var(--white);
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--navy-500); }
  .form-group textarea { resize: vertical; min-height: 70px; }
  .form-group .hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  table th, table td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--gray-100); }
  table th { color: var(--gray-600); font-weight: 600; background: var(--gray-50); font-size: 12px; }
  table tbody tr:hover { background: var(--gray-50); }

  .badge { display: inline-block; padding: 3px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .badge.pending { background: #e9ecf2; color: var(--gray-600); }
  .badge.approved { background: #e3f4ec; color: var(--green-600); }
  .badge.approved-half { background: #fcf3d5; color: #8a6a14; }
  .badge.rejected { background: #fbe4e4; color: #a73838; }
  .badge.role { background: var(--gray-100); color: var(--navy-700); }
  .badge.role.admin { background: #e3edff; color: var(--navy-700); }

  .info-banner { background: #eff5ff; border: 1px solid #d6e4ff; color: var(--navy-700); padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .err-banner { background: #fdebeb; border: 1px solid #f5c6c6; color: #8b2929; padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .ok-banner { background: #e8f5ee; border: 1px solid #c4e6d2; color: #1d6e44; padding: 10px 14px; border-radius: 8px; font-size: 12.5px; margin-bottom: 16px; }
  .empty { padding: 32px; text-align: center; color: var(--gray-400); font-size: 13px; }
  .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; flex-wrap: wrap; }

  @media (max-width: 768px) {
    .app.active { flex-direction: column; }
    .sidebar { width: 100%; flex-direction: row; align-items: center; padding: 12px 14px; overflow-x: auto; }
    .sidebar .brand { border-bottom: none; padding: 0 12px 0 0; margin-bottom: 0; flex-shrink: 0; border-right: 1px solid rgba(255,255,255,0.1); margin-right: 8px; }
    .sidebar nav { display: flex; padding: 0; gap: 4px; flex: 1; }
    .sidebar nav .section { display: none; }
    .sidebar nav button { white-space: nowrap; padding: 8px 12px; }
    .sidebar .user-box { border-top: none; padding: 0 8px; flex-shrink: 0; }
    .sidebar .user-box .role { display: none; }
    .sidebar .user-box button { margin-top: 0; padding: 6px 10px; }
    .main { padding: 18px 16px; }
    .grid-3 { grid-template-columns: 1fr; }
    .form-row, .form-row.cols-3 { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    table th, table td { padding: 8px 6px; }
  }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(15,31,61,0.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 18px; }
  .modal-backdrop.active { display: flex; }
  .modal { background: var(--white); border-radius: 12px; padding: 24px; width: 100%; max-width: 480px; box-shadow: var(--shadow-md); max-height: 90vh; overflow-y: auto; }
  .modal h3 { margin: 0 0 14px; color: var(--navy-900); }
  .modal .actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
</style>
</head>
<body>

<div id="bootScreen" class="boot-wrap">
  <div class="spinner"></div>
  <div>시스템을 불러오는 중입니다...</div>
</div>

<!-- 초기 관리자 설정 -->
<div id="setupScreen" class="login-wrap" style="display:none;">
  <div class="login-card">
    <h1>최초 관리자 등록</h1>
    <p class="sub">이 시스템을 처음 사용합니다. 첫 관리자 계정을 만들어 주세요.</p>
    <form id="setupForm">
      <div class="row-2">
        <div>
          <label>아이디 *</label>
          <input id="setupUsername" required placeholder="예: admin" autocomplete="off" />
        </div>
        <div>
          <label>이름 *</label>
          <input id="setupName" required placeholder="예: 홍길동" />
        </div>
      </div>
      <label>이메일</label>
      <input id="setupEmail" type="email" placeholder="예: admin@whrcompany.com" />
      <div class="row-2">
        <div>
          <label>입사일 *</label>
          <input id="setupHire" type="date" required />
        </div>
        <div>
          <label>비밀번호 *</label>
          <input id="setupPw" type="password" required placeholder="최소 4자" />
        </div>
      </div>
      <button type="submit" class="btn-primary">관리자 계정 만들기</button>
      <div class="err" id="setupErr"></div>
    </form>
  </div>
</div>

<!-- 로그인 -->
<div id="loginScreen" class="login-wrap" style="display:none;">
  <div class="login-card">
    <h1>사내 연차 관리 시스템</h1>
    <p class="sub">아이디와 비밀번호로 로그인해 주세요.</p>
    <form id="loginForm">
      <label for="loginUsername">아이디</label>
      <input id="loginUsername" type="text" autocomplete="username" required />
      <label for="loginPw">비밀번호</label>
      <input id="loginPw" type="password" autocomplete="current-password" required />
      <button type="submit" class="btn-primary" id="loginBtn">로그인</button>
      <div class="err" id="loginErr"></div>
    </form>
    <div style="margin-top:16px; text-align:center; font-size:12px; color:var(--gray-600);">
      처음 가입하시나요?
      <a href="#" id="goSignup" style="color:var(--green-600); font-weight:600;">회원가입</a>
    </div>
  </div>
</div>

<!-- 회원가입 -->
<div id="signupScreen" class="login-wrap" style="display:none;">
  <div class="login-card">
    <h1>회원가입</h1>
    <p class="sub" id="signupSub">본인 이름과 입사일을 입력해 주세요. 관리자가 미리 등록한 직원 목록에서 찾습니다.</p>

    <!-- 1단계: 매칭 -->
    <form id="signupMatchForm">
      <label>이름 *</label>
      <input id="suName" required placeholder="예: 홍길동" />
      <label>입사일 *</label>
      <input id="suHire" type="date" required />
      <button type="submit" class="btn-primary" id="suMatchBtn">다음</button>
      <div class="err" id="suMatchErr"></div>
      <div style="margin-top:14px; text-align:center; font-size:12px; color:var(--gray-600);">
        <a href="#" id="backToLogin" style="color:var(--navy-700);">← 로그인으로 돌아가기</a>
      </div>
    </form>

    <!-- 2단계: 정보 입력 -->
    <form id="signupInfoForm" style="display:none;">
      <div class="ok-banner" style="margin-bottom: 14px;">
        <strong id="suMatched"></strong>님 맞으시죠? 사용할 아이디와 비밀번호를 정하고 추가 정보를 입력해 주세요.
      </div>
      <div class="row-2">

        <div>
          <label>이메일</label>

<!-- 앱 -->
<div id="app" class="app">
  <aside class="sidebar">
    <div class="brand">
      <h2>연차 관리</h2>
      <p>HR Leave System</p>
    </div>
    <nav id="nav">
      <div class="section">메뉴</div>
      <button data-page="home">홈</button>
      <button data-page="myLeave">내 연차</button>
      <button data-page="apply">연차 신청</button>
      <button data-page="profile">내 정보</button>
      <div class="section admin-only">관리자</div>
      <button data-page="employees" class="admin-only">직원 관리</button>
      <button data-page="approvals" class="admin-only">승인 관리</button>
    </nav>
    <div class="user-box">
      <div class="name" id="userName">-</div>
      <div class="role" id="userRole">-</div>
      <button id="logoutBtn">로그아웃</button>
    </div>
  </aside>
  <main class="main" id="mainContent"></main>
</div>

<div id="modalBackdrop" class="modal-backdrop">
  <div class="modal" id="modalBody"></div>
</div>

<script>
/* ==================================================================
   사내 연차 관리 시스템 — v2 (아이디 로그인 + 정보 수정 기능)
   ================================================================== */

/* ------------------ 0. Supabase 연결 ------------------ */
const SUPABASE_URL = "https://ndfboobqkgdkieitskgo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5kZmJvb2Jxa2dka2llaXRza2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NjgyNjEsImV4cCI6MjA5NTA0NDI2MX0.LV4ZVD5Re-_A9uA3hioWPdIDGGitkJmKkwlRVvmm250";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ------------------ 1. 유틸 ------------------ */
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => Array.from(document.querySelectorAll(sel));
const fmtDate = (d) => {
  if (!d) return "-";
  if (!(d instanceof Date)) d = new Date(d);
  const yy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  return `${yy}-${mm}-${dd}`;
};
const today = () => new Date();

async function hashPassword(pw) {
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest("SHA-256", enc.encode(pw));
  return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ------------------ 2. DB ↔ JS 변환 (DB: username, JS: 내부적으로 empNo 유지) ------------------
   * 내부 변수명은 empNo로 유지하지만 의미는 "아이디(username)"
   * DB 컬럼명만 username으로 매핑
   ------------------------------------------------------------- */
const dbToEmp = (r) => r && ({
  empNo: r.username, name: r.name, email: r.email,
  hireDate: r.hire_date, position: r.position, department: r.department,
  passwordHash: r.password_hash, role: r.role,
});
const empToDb = (e) => ({
  username: e.empNo, name: e.name, email: e.email,
  hire_date: e.hireDate, position: e.position, department: e.department,
  password_hash: e.passwordHash, role: e.role,
});
const dbToReq = (r) => r && ({
  id: r.id, empNo: r.username, requestedAt: r.requested_at,
  startDate: r.start_date, endDate: r.end_date,
  days: Number(r.days), halfDayPart: r.half_day_part,
  reason: r.reason, status: r.status,
  approverEmpNo: r.approver_username, processedAt: r.processed_at,
});
const dbToPolicy = (r) => r ? ({
  monthlyAccrual: Number(r.monthly_accrual),
  yearOneBulk: Number(r.year_one_bulk),
  allowPastDate: r.allow_past_date,
}) : { monthlyAccrual: 1, yearOneBulk: 15, allowPastDate: true };

/* ------------------ 3. 저장 모듈 ------------------ */
const Store = {
  _cache: { employees: [], requests: [], policy: null },

  async refresh() {
    const [empsRes, reqsRes, polRes] = await Promise.all([
      sb.from("employees").select("*").order("username"),
      sb.from("leave_requests").select("*").order("requested_at", { ascending: false }),
      sb.from("policy").select("*").eq("id", 1).maybeSingle(),
    ]);
    if (empsRes.error) throw empsRes.error;
    if (reqsRes.error) throw reqsRes.error;
    if (polRes.error) throw polRes.error;
    this._cache.employees = (empsRes.data || []).map(dbToEmp);
    this._cache.requests  = (reqsRes.data  || []).map(dbToReq);
    this._cache.policy    = dbToPolicy(polRes.data);
  },

  getEmployees() { return this._cache.employees; },
  getEmployee(empNo) { return this._cache.employees.find((e) => e.empNo === empNo); },
  getRequests() { return this._cache.requests; },
  getRequestsByEmp(empNo) { return this._cache.requests.filter((r) => r.empNo === empNo); },
  getPolicy() { return this._cache.policy; },

  async addEmployee(emp) {
    const { error } = await sb.from("employees").insert(empToDb(emp));
    if (error) throw error;
    await this.refresh();
  },

  // 직원 정보 수정 (비밀번호 제외)
  async updateEmployee(currentUsername, patch) {
    const row = {};
    if ("name" in patch) row.name = patch.name;
    if ("email" in patch) row.email = patch.email;
    if ("hireDate" in patch) row.hire_date = patch.hireDate;
    if ("position" in patch) row.position = patch.position;
    if ("department" in patch) row.department = patch.department;
    if ("role" in patch) row.role = patch.role;
    if ("empNo" in patch) row.username = patch.empNo; // 아이디 변경
    if (Object.keys(row).length === 0) return;
    const { error } = await sb.from("employees").update(row).eq("username", currentUsername);
    if (error) throw error;
    await this.refresh();
  },

  // 비밀번호만 변경
  async updateEmployeePassword(username, newHash) {
    const { error } = await sb.from("employees").update({ password_hash: newHash }).eq("username", username);
    if (error) throw error;
    await this.refresh();
  },

  async addRequest(req) {
    const row = {
      username: req.empNo,
      start_date: req.startDate,
      end_date: req.endDate,
      days: req.days,
      half_day_part: req.halfDayPart,
      reason: req.reason,
      status: "pending",
    };
    const { error } = await sb.from("leave_requests").insert(row);
    if (error) throw error;
    await this.refresh();
  },
  async updateRequest(id, patch) {
    const row = {};
    if ("status" in patch) row.status = patch.status;
    if ("approverEmpNo" in patch) row.approver_username = patch.approverEmpNo;
    if ("processedAt" in patch) row.processed_at = patch.processedAt;
    const { error } = await sb.from("leave_requests").update(row).eq("id", id);
    if (error) throw error;
    await this.refresh();
  },

  setSession(empNo) { localStorage.setItem("leave_session_v2", empNo); },
  getSession() {
    const s = localStorage.getItem("leave_session_v2");
    return s ? { empNo: s } : null;
  },
  clearSession() { localStorage.removeItem("leave_session_v2"); },
};

/* ------------------ 4. 연차 계산 ------------------ */
function calcGrantedForYear(emp, year, asOf = today()) {
  const policy = Store.getPolicy();
  const hireDate = new Date(emp.hireDate);
  const yearEnd = new Date(year, 11, 31, 23, 59, 59);
  const ref = asOf < yearEnd ? asOf : yearEnd;
  if (hireDate > new Date(year, 11, 31)) return 0;

  let granted = 0;
  for (let m = 0; m < 12; m++) {
    const eventDate = new Date(year, m, 1);
    if (eventDate > ref) break;
    const prevMonthStart = new Date(year, m - 1, 1);
    if (hireDate <= prevMonthStart) granted += policy.monthlyAccrual;
  }
  const oneYearAnniv = new Date(hireDate);
  oneYearAnniv.setFullYear(oneYearAnniv.getFullYear() + 1);
  if (oneYearAnniv.getFullYear() === year && oneYearAnniv <= ref) {
    granted += policy.yearOneBulk;
  }
  return granted;
}
function calcUsedForYear(empNo, year) {
  return Store.getRequests()
    .filter((r) => r.empNo === empNo && r.status === "approved")
    .filter((r) => new Date(r.startDate).getFullYear() === year)
    .reduce((sum, r) => sum + Number(r.days || 0), 0);
}
function calcBalance(emp, year = today().getFullYear()) {
  const granted = calcGrantedForYear(emp, year);
  const used = calcUsedForYear(emp.empNo, year);
  return { granted, used, remaining: Math.max(0, granted - used) };
}

pages.apply = function () {
  const u = currentUser();

  const todayStr = fmtDate(today());

  $("#mainContent").innerHTML = `
    <h2 class="page-title">연차 신청</h2>
    <p class="page-sub">신청 후 관리자 승인을 거치면 사용 연차에 반영됩니다.</p>

    <div class="card">
      <h3>신청서 작성</h3>
      <form id="applyForm">
        <div class="form-row cols-3">
          <div class="form-group">
            <label>사용 단위</label>
            <select id="unit" required>
              <option value="1">연차 (1일)</option>
              <option value="0.5">반차 (0.5일)</option>
            </select>
          </div>
          <div class="form-group" id="halfGroup" style="display:none;">
            <label>오전 / 오후</label>
            <select id="halfPart">
              <option value="AM">오전</option>
              <option value="PM">오후</option>
            </select>
          </div>
          <div class="form-group"></div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>시작일</label>
            <input type="date" id="startDate" required ${policy.allowPastDate ? "" : `min="${todayStr}"`} />
          </div>
          <div class="form-group" id="endGroup">
            <label>종료일</label>
            <input type="date" id="endDate" required ${policy.allowPastDate ? "" : `min="${todayStr}"`} />
          </div>
        </div>
        <div class="form-row cols-1">
          <div class="form-group">
            <label>사유</label>
            <textarea id="reason" placeholder="예: 개인 사유" required></textarea>
          </div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:8px;">
          <button type="button" class="btn ghost" id="cancelApply">취소</button>
          <button type="submit" class="btn green" id="submitApply">신청하기</button>
        </div>
      </form>
    </div>
  `;

  const unitSel = $("#unit");
  const halfGroup = $("#halfGroup");
  const endGroup = $("#endGroup");
  unitSel.addEventListener("change", () => {
    const half = unitSel.value === "0.5";
    halfGroup.style.display = half ? "" : "none";
    endGroup.style.display = half ? "none" : "";
  });

  $("#cancelApply").addEventListener("click", () => navigate("myLeave"));

  $("#applyForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const submitBtn = $("#submitApply");
    submitBtn.disabled = true;
    try {
      const unit = Number(unitSel.value);
      const start = $("#startDate").value;
      let end = unit === 0.5 ? start : $("#endDate").value;
      const halfPart = unit === 0.5 ? $("#halfPart").value : null;
      const reason = $("#reason").value.trim();

      if (!start || !end) throw new Error("날짜를 입력해 주세요.");
      if (new Date(end) < new Date(start)) throw new Error("종료일이 시작일보다 빠를 수 없습니다.");

      let days;
      if (unit === 0.5) days = 0.5;

        const ms = new Date(end) - new Date(start);

      }

      const bal2 = calcBalance(u);
      if (days > bal2.remaining) throw new Error(`잔여 연차(${bal2.remaining}일)보다 많이 신청할 수 없습니다.`);

      await Store.addRequest({
        empNo: u.empNo, startDate: start, endDate: end,
        days, halfDayPart: halfPart, reason,
      });

      alert("신청이 등록되었습니다. 관리자 승인을 기다려 주세요.");
      navigate("myLeave");
    } catch (err) {
      alert("신청 실패: " + (err.message || err));
      submitBtn.disabled = false;
    }
  });
};

                <button class="btn ghost xs" data-reset="${escapeHtml(e.empNo)}">비번 리셋</button>
              </td>
            </tr>`;
          }).join("")}
        </tbody>
      </table>
    </div>
  `;

  });
  $$("button[data-reset]").forEach((btn) => {
    btn.addEventListener("click", () => openResetPwModal(btn.dataset.reset));
  });
};

pages.approvals = function () {
  const u = currentUser();
  if (u.role !== "admin") return navigate("home");
  const all = Store.getRequests();
  const pendings = all.filter((r) => r.status === "pending");
  const processed = all.filter((r) => r.status !== "pending");

  $("#mainContent").innerHTML = `
    <h2 class="page-title">승인 관리</h2>
    <p class="page-sub">대기 중인 신청을 승인하거나 반려합니다.</p>
    <div class="card">
      <h3>승인 대기 (${pendings.length}건)</h3>
      ${pendings.length ? renderRequestTable(pendings, { showEmp: true, showActions: true }) : `<div class="empty">대기 중인 신청이 없습니다.</div>`}
    </div>
    <div class="card">
      <h3>처리 완료 내역 (${processed.length}건)</h3>
      ${processed.length ? renderRequestTable(processed, { showEmp: true, showActions: false }) : `<div class="empty">처리된 내역이 없습니다.</div>`}
    </div>
  `;

  $$("button[data-act]").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      const r = Store.getRequests().find((x) => x.id === id);
      if (!r) return;
      btn.disabled = true;
      try {
        if (act === "approve") {
          const emp = Store.getEmployee(r.empNo);
          const bal = calcBalance(emp);
          if (r.days > bal.remaining) {
            if (!confirm(`현재 잔여(${bal.remaining}일)보다 신청 일수(${r.days}일)가 많습니다. 그래도 승인할까요?`)) {
              btn.disabled = false; return;
            }
          }
          await Store.updateRequest(id, { status: "approved", approverEmpNo: u.empNo, processedAt: new Date().toISOString() });
        } else if (act === "reject") {
          await Store.updateRequest(id, { status: "rejected", approverEmpNo: u.empNo, processedAt: new Date().toISOString() });
        }
        navigate("approvals");
      } catch (err) {
        alert("처리 실패: " + (err.message || err));
        btn.disabled = false;
      }
    });
  });
};

/* ------------------ 14. 공통: 신청 테이블 ------------------ */
function renderRequestTable(reqs, opts) {
  const { showEmp, showActions } = opts || {};
  return `<table>
    <thead><tr>
      <th>신청일</th>
      ${showEmp ? "<th>신청자</th>" : ""}
      <th>기간</th><th>일수</th><th>사유</th><th>상태</th>
      ${showActions ? "<th style='text-align:right;'>처리</th>" : "<th>처리일</th>"}
    </tr></thead>
    <tbody>
    ${reqs.map((r) => {
      const emp = Store.getEmployee(r.empNo);
      const range = r.days === 0.5
        ? `${r.startDate} (${r.halfDayPart === "AM" ? "오전" : "오후"} 반차)`
        : (r.startDate === r.endDate ? r.startDate : `${r.startDate} ~ ${r.endDate}`);
      let badge = "";
      if (r.status === "pending") badge = `<span class="badge pending">대기 중</span>`;
      else if (r.status === "approved" && r.days === 0.5) badge = `<span class="badge approved-half">반차 승인</span>`;
      else if (r.status === "approved") badge = `<span class="badge approved">승인</span>`;
      else if (r.status === "rejected") badge = `<span class="badge rejected">반려</span>`;
      const lastCol = showActions
        ? `<td style="text-align:right;">
             <button class="btn green sm" data-act="approve" data-id="${r.id}">승인</button>
             <button class="btn danger sm" data-act="reject"  data-id="${r.id}">반려</button>
           </td>`
        : `<td>${r.processedAt ? fmtDate(r.processedAt) : "-"}</td>`;
      return `<tr>
        <td>${fmtDate(r.requestedAt)}</td>
        ${showEmp ? `<td>${emp ? escapeHtml(emp.name) : escapeHtml(r.empNo)} <span style="color:var(--gray-400);font-size:11px;">(${escapeHtml(r.empNo)})</span></td>` : ""}
        <td>${range}</td>
        <td>${r.days}일</td>
        <td style="max-width:240px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHtml(r.reason || "")}">${escapeHtml(r.reason || "-")}</td>
        <td>${badge}</td>
        ${lastCol}
      </tr>`;
    }).join("")}
    </tbody></table>`;
}

// 1단계: 이름 + 입사일로 임시 계정 매칭
$("#signupMatchForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = $("#suMatchErr");
  errEl.textContent = "";
  const btn = $("#suMatchBtn");
  btn.disabled = true;
  try {
    await Store.refresh();
    const name = $("#suName").value.trim();
    const hire = $("#suHire").value;
    if (!name || !hire) throw new Error("이름과 입사일을 모두 입력해 주세요.");

    // pending_* 으로 시작하는 임시 계정 중 이름+입사일 일치하는 것 찾기
    const candidates = Store.getEmployees().filter(e =>
      e.empNo.startsWith("pending_") &&
      e.name === name &&
      e.hireDate === hire
    );

    if (candidates.length === 0) {
      throw new Error("일치하는 직원 정보를 찾지 못했습니다. 이름·입사일을 다시 확인하거나 관리자에게 문의하세요.");
    }
    if (candidates.length > 1) {
      throw new Error("동명이인이 있어 자동 매칭이 어렵습니다. 관리자에게 문의하세요.");
    }

    _signupMatchedEmp = candidates[0];
    $("#suMatched").textContent = `${_signupMatchedEmp.name} (${_signupMatchedEmp.department || '부서 미등록'})`;
    // 2단계로 전환
    $("#signupMatchForm").style.display = "none";
    $("#signupInfoForm").style.display = "";
  } catch (err) {
    errEl.textContent = err.message || err;
    btn.disabled = false;
  }
});

// 2단계: 추가 정보 입력 + 임시 계정 활성화
$("#signupInfoForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const errEl = $("#suInfoErr");
  errEl.textContent = "";
  const btn = $("#suCompleteBtn");
  btn.disabled = true;
  try {
    if (!_signupMatchedEmp) throw new Error("매칭 정보가 없습니다. 다시 시도해 주세요.");
    const newU = $("#suUsername").value.trim();
    const email = $("#suEmail").value.trim() || null;
    const position = $("#suPosition").value.trim() || null;
    const pw = $("#suPw").value;
    const pw2 = $("#suPw2").value;

    if (!newU) throw new Error("아이디를 입력해 주세요.");
    if (pw.length < 4) throw new Error("비밀번호는 최소 4자 이상이어야 합니다.");
    if (pw !== pw2) throw new Error("비밀번호 확인이 일치하지 않습니다.");

    // 새 아이디 중복 체크
    if (newU !== _signupMatchedEmp.empNo && Store.getEmployee(newU)) {
      throw new Error("이미 사용 중인 아이디입니다.");
    }

    // 1) 임시 username을 새 username으로 변경 + 이메일/직급 업데이트
    await Store.updateEmployee(_signupMatchedEmp.empNo, {
      empNo: newU,
      email,
      position,
    });
    // 2) 비밀번호 진짜 hash로 덮어쓰기
    await Store.updateEmployeePassword(newU, await hashPassword(pw));
    // 3) 세션 설정 후 앱으로
    Store.setSession(newU);
    await Store.refresh();
    showApp();
  } catch (err) {
    errEl.textContent = err.message || err;
    btn.disabled = false;
  }
});

(async function init() {
  showBoot();
  try {
    await Store.refresh();
  } catch (e) {
    document.body.innerHTML = `
      <div class="boot-wrap">
        <div style="max-width:500px; padding:24px; background:white; color:var(--gray-800); border-radius:12px;">
          <h2 style="margin-top:0; color:var(--red-500);">Supabase 연결 실패</h2>
          <p>${escapeHtml(e.message || e)}</p>
          <p style="font-size:12px; color:var(--gray-600);">DB 마이그레이션(emp_no → username)이 아직 실행되지 않은 경우 이 오류가 납니다. supabase_migration_v2.sql 을 Supabase SQL Editor에서 실행해 주세요.</p>
        </div>
      </div>`;
    return;
  }

  if (Store.getEmployees().length === 0) {
    showSetup();
    return;
  }

  const s = Store.getSession();
  if (s && Store.getEmployee(s.empNo)) {
    showApp();
  } else {
    showLogin();
  }
})();
</script>
